<script>
// ── State ──────────────────────────────────────────────────────
var allStockData   = [];
var stFilterValue  = '';
var stFilterField  = '';

// ============================================================
// loadStockTable
// ============================================================
function loadStockTable() {
  showLoading('กำลังโหลดสต็อก...');
  document.getElementById('stEmptyState').classList.add('hidden');

  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (!result.success) { showToast(result.message, 'error'); return; }
      allStockData = result.data || [];
      filterStockTable();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('โหลดสต็อกไม่สำเร็จ: ' + err.message, 'error');
    })
    .getStockOnHand({});
}

// ============================================================
// setStockFilter
// ============================================================
function setStockFilter(value, field, btn) {
  stFilterValue = value;
  stFilterField = field || '';

  document.querySelectorAll('.stock-filter-btn').forEach(function(b) {
    b.classList.remove(
      'bg-blue-500','bg-green-500','bg-orange-500',
      'bg-red-500','bg-yellow-500','bg-red-700','text-white'
    );
    b.classList.add('bg-white');
  });

  if (btn) {
    btn.classList.remove('bg-white');
    var colorMap = {
      '':                  'bg-blue-500',
      'ปกติ':              'bg-green-500',
      'ต่ำกว่าจุดสั่งซื้อ': 'bg-orange-500',
      'หมด':               'bg-red-500',
      'ใกล้หมดอายุ':       'bg-yellow-500',
      'หมดอายุแล้ว':       'bg-red-700'
    };
    btn.classList.add(colorMap[value] || 'bg-blue-500', 'text-white');
  }

  filterStockTable();
}

// ============================================================
// filterStockTable
// ============================================================
function filterStockTable() {
  var search   = (document.getElementById('stSearchInput').value || '').toLowerCase().trim();
  var filtered = allStockData;

  if (search) {
    filtered = filtered.filter(function(item) {
      return item.productName.toLowerCase().includes(search) ||
             item.barcode.toLowerCase().includes(search)     ||
             item.lotNumber.toLowerCase().includes(search)   ||
             item.sku.toLowerCase().includes(search);
    });
  }

  if (stFilterValue) {
    filtered = filtered.filter(function(item) {
      return stFilterField === 'expiry'
        ? item.expiryStatus === stFilterValue
        : item.stockStatus  === stFilterValue;
    });
  }

  renderStockTable(filtered);
}

// ============================================================
// renderStockTable
// ============================================================
function renderStockTable(data) {
  var emptyState = document.getElementById('stEmptyState');
  var cardList   = document.getElementById('stCardList');
  var tableBody  = document.getElementById('stTableBody');

  updateStSummary(data);

  if (!data || data.length === 0) {
    emptyState.classList.remove('hidden');
    cardList.innerHTML  = '';
    tableBody.innerHTML = '<tr><td colspan="7" class="py-4"></td></tr>';
    return;
  }

  emptyState.classList.add('hidden');
  renderStockCards(data, cardList);
  renderStockTableRows(data, tableBody);
}

// ============================================================
// renderStockCards - mobile card layout
// ============================================================
function renderStockCards(data, container) {
  container.innerHTML = data.map(function(item) {

    var balanceColor = item.qtyBalance <= 0
      ? 'text-red-600'
      : (item.stockStatus === 'ต่ำกว่าจุดสั่งซื้อ' ||
         item.stockStatus === 'ใกล้จุดสั่งซื้อ')
        ? 'text-orange-600'
        : 'text-gray-900';

    var cardBorder =
      item.stockStatus  === 'หมด'           ||
      item.expiryStatus === 'หมดอายุแล้ว'
        ? 'border-l-red-400'
      : item.stockStatus  === 'ต่ำกว่าจุดสั่งซื้อ' ||
        item.expiryStatus === 'ใกล้หมดอายุ'
        ? 'border-l-orange-400'
        : 'border-l-green-400';

    // ใช้ getDaysLeft จาก js.html (global scope)
    var days     = getDaysLeft(item.expiryDate);
    var daysText = formatDaysLeft(days);
    var daysCls  = getExpiryColorClass(days);

    return (
      '<div class="bg-white rounded-xl shadow-sm border-l-4 ' + cardBorder + ' p-3">' +

        // Row 1: ชื่อ + คงเหลือ
        '<div class="flex items-start justify-between gap-2">' +
          '<div class="flex-1 min-w-0">' +
            '<div class="text-sm font-bold text-gray-900 leading-tight">' +
              escapeHtml(item.productName) +
            '</div>' +
            '<div class="text-xs text-gray-400 mt-0.5">' +
              escapeHtml(item.barcode) +
              (item.sku ? ' · ' + escapeHtml(item.sku) : '') +
            '</div>' +
          '</div>' +
          '<div class="text-right flex-shrink-0">' +
            '<div class="text-lg font-bold ' + balanceColor + ' leading-tight">' +
              formatNumber(item.qtyBalance) +
            '</div>' +
            '<div class="text-xs text-gray-400">' + escapeHtml(item.unit) + '</div>' +
          '</div>' +
        '</div>' +

        // Row 2: LOT + วันหมดอายุ
        '<div class="mt-2 grid grid-cols-2 gap-x-4 gap-y-0.5">' +
          '<div class="text-xs text-gray-500">' +
            '<span class="font-medium text-gray-600">LOT:</span> ' +
            escapeHtml(item.lotNumber) +
          '</div>' +
          '<div class="text-xs">' +
            '<span class="font-medium text-gray-600">หมดอายุ:</span> ' +
            '<span class="text-gray-700">' +
              escapeHtml(item.expiryDate || '-') +
            '</span>' +
            (daysText
              ? ' <span class="' + daysCls + '">(' + escapeHtml(daysText) + ')</span>'
              : '') +
          '</div>' +
          '<div class="text-xs text-gray-400 col-span-2">' +
            'ROP: <span class="font-medium text-gray-700">' +
              formatNumber(item.reorderPoint) +
            '</span>' +
          '</div>' +
        '</div>' +

        // Row 3: chips
        '<div class="flex items-center gap-2 mt-2 flex-wrap">' +
          getStockStatusChip(item.stockStatus) +
          getExpiryStatusChip(item.expiryStatus) +
        '</div>' +

      '</div>'
    );
  }).join('');
}

// ============================================================
// renderStockTableRows - desktop table layout
// ============================================================
function renderStockTableRows(data, tbody) {
  tbody.innerHTML = data.map(function(item, idx) {

    var balanceColor = item.qtyBalance <= 0
      ? 'text-red-600 font-bold'
      : (item.stockStatus === 'ต่ำกว่าจุดสั่งซื้อ' ||
         item.stockStatus === 'ใกล้จุดสั่งซื้อ')
        ? 'text-orange-600 font-bold'
        : 'text-gray-900 font-semibold';

    var rowBg =
      item.stockStatus  === 'หมด'           ||
      item.expiryStatus === 'หมดอายุแล้ว'
        ? 'bg-red-50'
      : item.stockStatus  === 'ต่ำกว่าจุดสั่งซื้อ' ||
        item.expiryStatus === 'ใกล้หมดอายุ'
        ? 'bg-orange-50'
        : '';

    // ใช้ getDaysLeft จาก js.html (global scope)
    var days       = getDaysLeft(item.expiryDate);
    var daysText   = formatDaysLeft(days);
    var expiryStyle = getExpiryColorStyle(days);

    return (
      '<tr class="border-b border-gray-100 hover:bg-blue-50 transition-colors ' + rowBg + '">' +

        // #
        '<td class="px-4 py-3 text-xs text-gray-400">' + (idx + 1) + '</td>' +

        // สินค้า
        '<td class="px-4 py-3">' +
          '<div class="font-semibold text-gray-900 text-sm leading-tight">' +
            escapeHtml(item.productName) +
          '</div>' +
          '<div class="text-xs text-gray-400 mt-0.5">' +
            escapeHtml(item.barcode) +
            (item.sku ? ' · ' + escapeHtml(item.sku) : '') +
          '</div>' +
          (item.packSize
            ? '<div class="text-xs text-gray-300">' + escapeHtml(item.packSize) + '</div>'
            : '') +
        '</td>' +

        // LOT / หมดอายุ
        '<td class="px-4 py-3">' +
          '<div class="text-sm font-medium text-gray-800">' +
            escapeHtml(item.lotNumber) +
          '</div>' +
          '<div class="text-xs mt-0.5" style="' + expiryStyle + '">' +
            escapeHtml(item.expiryDate || '-') +
          '</div>' +
          (daysText
            ? '<div class="text-xs mt-0.5" style="' + expiryStyle + '">' +
                '(' + escapeHtml(daysText) + ')' +
              '</div>'
            : '') +
        '</td>' +

        // คงเหลือ
        '<td class="px-4 py-3 text-center">' +
          '<div class="text-base ' + balanceColor + '">' +
            formatNumber(item.qtyBalance) +
          '</div>' +
          '<div class="text-xs text-gray-400">' + escapeHtml(item.unit) + '</div>' +
        '</td>' +

        // ROP
        '<td class="px-4 py-3 text-center">' +
          '<div class="text-sm text-gray-700">' + formatNumber(item.reorderPoint) + '</div>' +
          '<div class="text-xs text-gray-400">' + escapeHtml(item.unit) + '</div>' +
        '</td>' +

        // สถานะสต็อก
        '<td class="px-4 py-3 text-center">' +
          getStockStatusChip(item.stockStatus) +
        '</td>' +

        // สถานะอายุ
        '<td class="px-4 py-3 text-center">' +
          getExpiryStatusChip(item.expiryStatus) +
        '</td>' +

      '</tr>'
    );
  }).join('');
}

// ============================================================
// updateStSummary
// ============================================================
function updateStSummary(data) {
  var total  = data.length;
  var lowCnt = data.filter(function(i) {
    return i.stockStatus === 'ต่ำกว่าจุดสั่งซื้อ';
  }).length;
  var outCnt = data.filter(function(i) {
    return i.stockStatus === 'หมด';
  }).length;
  var expCnt = data.filter(function(i) {
    return i.expiryStatus === 'ใกล้หมดอายุ' || i.expiryStatus === 'หมดอายุแล้ว';
  }).length;

  document.getElementById('stSummaryText').textContent = 'พบ ' + total + ' รายการ';

  var chips = '';
  if (lowCnt > 0) chips += '<span class="chip chip-orange">' + lowCnt + ' ต่ำกว่า ROP</span>';
  if (outCnt > 0) chips += '<span class="chip chip-red">'    + outCnt + ' หมดสต็อก</span>';
  if (expCnt > 0) chips += '<span class="chip chip-yellow">' + expCnt + ' ใกล้/หมดอายุ</span>';

  document.getElementById('stSummaryChips').innerHTML = chips;
}
</script></template>

<script>
// ============================================================
// CRITICAL: สร้าง local alias ของทุก helper จาก window
// ต้องเป็นบรรทัดแรกสุดเพื่อ shadow ให้ใช้ได้ทั้ง scope นี้
// ============================================================
var formatExpiryDisplay = (typeof window.formatExpiryDisplay === 'function')
  ? window.formatExpiryDisplay
  : function(s) {
      if (!s || String(s).trim() === '' || s === '-') return '-';
      return String(s).trim();
    };

var escapeHtml = (typeof window.escapeHtml === 'function')
  ? window.escapeHtml
  : function(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    };

var formatNumber = (typeof window.formatNumber === 'function')
  ? window.formatNumber
  : function(n) {
      var x = Number(n);
      return isNaN(x) ? '0' : x.toLocaleString('th-TH');
    };

var getDaysLeft = (typeof window.getDaysLeft === 'function')
  ? window.getDaysLeft
  : function(dateStr) {
      if (!dateStr || dateStr === '-') return 9999;
      try {
        var s = String(dateStr).trim();
        var d;
        if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) {
          var p = s.split('/');
          d = new Date(parseInt(p[2],10), parseInt(p[1],10)-1, parseInt(p[0],10));
        } else {
          d = new Date(s);
        }
        if (isNaN(d.getTime())) return 9999;
        var today = new Date();
        today.setHours(0,0,0,0); d.setHours(0,0,0,0);
        return Math.floor((d - today) / 86400000);
      } catch(e) { return 9999; }
    };

var formatDaysLeft = (typeof window.formatDaysLeft === 'function')
  ? window.formatDaysLeft
  : function(days) {
      if (days === 9999) return '';
      if (days < 0)   return 'หมดอายุแล้ว ' + Math.abs(days) + ' วัน';
      if (days === 0) return 'หมดอายุวันนี้';
      if (days <= 90) return 'อีก ' + days + ' วัน';
      return '';
    };

var getExpiryColorClass = (typeof window.getExpiryColorClass === 'function')
  ? window.getExpiryColorClass
  : function(days) {
      if (days === 9999) return 'text-gray-400';
      if (days < 0)   return 'text-red-600 font-bold';
      if (days <= 30) return 'text-orange-600 font-semibold';
      if (days <= 90) return 'text-yellow-600 font-medium';
      return 'text-gray-600';
    };

var getExpiryColorStyle = (typeof window.getExpiryColorStyle === 'function')
  ? window.getExpiryColorStyle
  : function(days) {
      if (days < 0)   return 'color:#dc2626;font-weight:700';
      if (days <= 30) return 'color:#ea580c;font-weight:600';
      if (days <= 90) return 'color:#d97706;font-weight:500';
      return 'color:#374151';
    };

var getTxnTypeChip = (typeof window.getTxnTypeChip === 'function')
  ? window.getTxnTypeChip
  : function(t) {
      var m = {
        'INITIAL':    '<span class="chip chip-blue">เริ่มต้น</span>',
        'IN':         '<span class="chip chip-green">รับเข้า</span>',
        'OUT':        '<span class="chip chip-red">เบิกออก</span>',
        'ADJUST_IN':  '<span class="chip chip-blue">ปรับเพิ่ม</span>',
        'ADJUST_OUT': '<span class="chip chip-orange">ปรับลด</span>'
      };
      return m[t] || '<span class="chip chip-gray">' + (t||'') + '</span>';
    };

var showLoading  = window.showLoading  || function() {};
var hideLoading  = window.hideLoading  || function() {};
var showToast    = window.showToast    || function(m) { console.log(m); };

// ============================================================
// State
// ============================================================
var allHistoryData = [];
var histFilterType = '';

// ============================================================
// loadHistory
// ============================================================
window.loadHistory = function() {
  showLoading('กำลังโหลดประวัติ...');
  var emptyEl = document.getElementById('histEmptyState');
  if (emptyEl) emptyEl.classList.add('hidden');

  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (!result || !result.success) {
        showToast(result ? result.message : 'เกิดข้อผิดพลาด', 'error');
        return;
      }
      allHistoryData = result.data || [];
      window.filterHistory();
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('โหลดประวัติไม่สำเร็จ: ' + (err.message || ''), 'error');
    })
    .getTransactions({ limit: 300 });
};

// ============================================================
// setHistFilter
// ============================================================
window.setHistFilter = function(type, btn) {
  histFilterType = type;

  document.querySelectorAll('.hist-filter-btn').forEach(function(b) {
    b.classList.remove(
      'bg-blue-500','bg-green-500','bg-red-500',
      'bg-blue-400','bg-indigo-400','bg-orange-400','text-white'
    );
    b.classList.add('bg-white');
  });

  if (btn) {
    btn.classList.remove('bg-white');
    var colorMap = {
      '':           'bg-blue-500',
      'IN':         'bg-green-500',
      'OUT':        'bg-red-500',
      'INITIAL':    'bg-blue-400',
      'ADJUST_IN':  'bg-indigo-400',
      'ADJUST_OUT': 'bg-orange-400'
    };
    btn.classList.add(colorMap[type] || 'bg-blue-500', 'text-white');
  }

  window.filterHistory();
};

// ============================================================
// filterHistory
// ============================================================
window.filterHistory = function() {
  var searchEl = document.getElementById('histSearchInput');
  var search   = searchEl ? searchEl.value.toLowerCase().trim() : '';
  var filtered = allHistoryData;

  if (histFilterType) {
    filtered = filtered.filter(function(item) {
      return item.txnType === histFilterType;
    });
  }

  if (search) {
    filtered = filtered.filter(function(item) {
      return (item.productName   || '').toLowerCase().indexOf(search) !== -1 ||
             (item.barcode       || '').toLowerCase().indexOf(search) !== -1 ||
             (item.lotNumber     || '').toLowerCase().indexOf(search) !== -1 ||
             (item.fullName      || '').toLowerCase().indexOf(search) !== -1 ||
             (item.username      || '').toLowerCase().indexOf(search) !== -1 ||
             (item.remark        || '').toLowerCase().indexOf(search) !== -1 ||
             (item.requisitionNo || '').toLowerCase().indexOf(search) !== -1;
    });
  }

  _renderHistory(filtered);
};

// ============================================================
// _renderHistory
// ============================================================
function _renderHistory(data) {
  var emptyState = document.getElementById('histEmptyState');
  var cardList   = document.getElementById('histCardList');
  var tableBody  = document.getElementById('histTableBody');

  _updateHistSummary(data);

  if (!data || data.length === 0) {
    if (emptyState) emptyState.classList.remove('hidden');
    if (cardList)   cardList.innerHTML = '';
    if (tableBody)  tableBody.innerHTML = '<tr><td colspan="8" class="py-4"></td></tr>';
    return;
  }

  if (emptyState) emptyState.classList.add('hidden');
  if (cardList)   _renderHistoryCards(data, cardList);
  if (tableBody)  _renderHistoryTableRows(data, tableBody);
}

// ============================================================
// _renderHistoryCards
// ============================================================
function _renderHistoryCards(data, container) {
  container.innerHTML = data.map(function(txn) {
    var isIn = txn.txnType === 'IN' || txn.txnType === 'INITIAL' || txn.txnType === 'ADJUST_IN';
    var borderColor = isIn ? 'border-l-green-400' : 'border-l-red-400';
    var qtyValue    = isIn ? (txn.qtyIn || 0) : (txn.qtyOut || 0);
    var qtyColor    = isIn ? 'text-green-600' : 'text-red-600';
    var qtySign     = isIn ? '+' : '−';

    var expiryStr = formatExpiryDisplay(txn.expiryDate);
    var days      = getDaysLeft(txn.expiryDate);
    var daysText  = (txn.expiryDate && days !== 9999) ? formatDaysLeft(days) : '';
    var daysCls   = getExpiryColorClass(days);

    return (
      '<div class="bg-white rounded-xl shadow-sm border-l-4 ' + borderColor + ' p-3">' +

        '<div class="flex items-start justify-between gap-2">' +
          '<div class="flex-1 min-w-0">' +
            '<div class="flex items-center gap-2 flex-wrap">' +
              '<span class="text-sm font-bold text-gray-900 leading-tight">' +
                escapeHtml(txn.productName || '') +
              '</span>' +
              getTxnTypeChip(txn.txnType) +
            '</div>' +
            '<div class="text-xs text-gray-400 mt-0.5">' +
              escapeHtml(txn.barcode || '') +
            '</div>' +
          '</div>' +
          '<div class="text-right flex-shrink-0">' +
            '<div class="text-lg font-bold ' + qtyColor + ' leading-tight">' +
              qtySign + formatNumber(qtyValue) +
            '</div>' +
            '<div class="text-xs text-gray-400">' +
              escapeHtml(txn.unit || '') +
            '</div>' +
          '</div>' +
        '</div>' +

        '<div class="mt-2 grid grid-cols-2 gap-x-4 gap-y-0.5">' +
          '<div class="text-xs text-gray-500">' +
            '<span class="font-medium text-gray-600">LOT:</span> ' +
            escapeHtml(txn.lotNumber || '-') +
          '</div>' +
          '<div class="text-xs">' +
            '<span class="font-medium text-gray-600">หมดอายุ:</span> ' +
            '<span class="text-gray-700">' + expiryStr + '</span>' +
            (daysText ? ' <span class="' + daysCls + '">(' + escapeHtml(daysText) + ')</span>' : '') +
          '</div>' +
          '<div class="text-xs text-gray-500 col-span-2">' +
            '<span class="font-medium text-gray-600">เวลา:</span> ' +
            escapeHtml(txn.timestamp || '') +
          '</div>' +
          (txn.requisitionNo
            ? '<div class="text-xs text-indigo-600 col-span-2 bg-indigo-50 rounded px-2 py-1 mt-0.5">' +
                '📄 <span class="font-medium">ใบเบิก:</span> ' +
                escapeHtml(txn.requisitionNo) +
                (txn.requisitionDate
                  ? ' <span class="text-indigo-400">(' + escapeHtml(txn.requisitionDate) + ')</span>'
                  : '') +
              '</div>'
            : '') +
        '</div>' +

        '<div class="flex items-center justify-between mt-2 pt-2 border-t border-gray-100">' +
          '<div class="flex items-center gap-1.5">' +
            '<div class="w-5 h-5 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">' +
              '<svg class="w-3 h-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"' +
                ' d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>' +
              '</svg>' +
            '</div>' +
            '<span class="text-xs text-gray-600 font-medium">' +
              escapeHtml(txn.fullName || '') +
            '</span>' +
          '</div>' +
          (txn.remark
            ? '<span class="text-xs text-gray-400 italic truncate max-w-xs">' +
                escapeHtml(txn.remark) +
              '</span>'
            : '') +
        '</div>' +

      '</div>'
    );
  }).join('');
}

// ============================================================
// _renderHistoryTableRows
// ============================================================
function _renderHistoryTableRows(data, tbody) {
  tbody.innerHTML = data.map(function(txn) {
    var isIn  = txn.txnType === 'IN' || txn.txnType === 'INITIAL' || txn.txnType === 'ADJUST_IN';
    var rowBg = isIn ? '' : 'bg-red-50';

    var qtyInStr = (txn.qtyIn > 0)
      ? '<span class="text-green-600 font-bold">+' + formatNumber(txn.qtyIn) + '</span>'
      : '<span class="text-gray-300">—</span>';

    var qtyOutStr = (txn.qtyOut > 0)
      ? '<span class="text-red-600 font-bold">−' + formatNumber(txn.qtyOut) + '</span>'
      : '<span class="text-gray-300">—</span>';

    var expiryStr   = formatExpiryDisplay(txn.expiryDate);
    var days        = getDaysLeft(txn.expiryDate);
    var daysText    = (txn.expiryDate && days !== 9999) ? formatDaysLeft(days) : '';
    var expiryStyle = getExpiryColorStyle(days);

    return (
      '<tr class="border-b border-gray-100 hover:bg-blue-50 transition-colors ' + rowBg + '">' +

        '<td class="px-4 py-3 whitespace-nowrap">' +
          '<div class="text-xs font-medium text-gray-700">' +
            escapeHtml(txn.timestamp || '') +
          '</div>' +
        '</td>' +

        '<td class="px-4 py-3 text-center">' +
          getTxnTypeChip(txn.txnType) +
        '</td>' +

        '<td class="px-4 py-3">' +
          '<div class="text-sm font-semibold text-gray-900 leading-tight">' +
            escapeHtml(txn.productName || '') +
          '</div>' +
          '<div class="text-xs text-gray-400 mt-0.5">' +
            escapeHtml(txn.barcode || '') +
          '</div>' +
        '</td>' +

        '<td class="px-4 py-3">' +
          '<div class="text-sm font-medium text-gray-800">' +
            escapeHtml(txn.lotNumber || '-') +
          '</div>' +
          '<div class="text-xs mt-0.5" style="' + expiryStyle + '">' +
            expiryStr +
          '</div>' +
          (daysText
            ? '<div class="text-xs mt-0.5" style="' + expiryStyle + '">' +
                '(' + escapeHtml(daysText) + ')' +
              '</div>'
            : '') +
          (txn.requisitionNo
            ? '<div class="text-xs text-indigo-500 mt-0.5">' +
                '📄 ' + escapeHtml(txn.requisitionNo) +
                (txn.requisitionDate
                  ? ' <span class="text-indigo-300">(' + escapeHtml(txn.requisitionDate) + ')</span>'
                  : '') +
              '</div>'
            : '') +
        '</td>' +

        '<td class="px-4 py-3 text-center">' +
          '<div>' + qtyInStr + '</div>' +
          (txn.qtyIn > 0 ? '<div class="text-xs text-gray-400">' + escapeHtml(txn.unit || '') + '</div>' : '') +
        '</td>' +

        '<td class="px-4 py-3 text-center">' +
          '<div>' + qtyOutStr + '</div>' +
          (txn.qtyOut > 0 ? '<div class="text-xs text-gray-400">' + escapeHtml(txn.unit || '') + '</div>' : '') +
        '</td>' +

        '<td class="px-4 py-3">' +
          '<div class="text-sm font-medium text-gray-800">' +
            escapeHtml(txn.fullName || '') +
          '</div>' +
          '<div class="text-xs text-gray-400">' +
            '@' + escapeHtml(txn.username || '') +
          '</div>' +
        '</td>' +

        '<td class="px-4 py-3">' +
          '<div class="text-xs text-gray-500 max-w-xs truncate" title="' + escapeHtml(txn.remark || '') + '">' +
            (txn.remark ? escapeHtml(txn.remark) : '<span class="text-gray-300">—</span>') +
          '</div>' +
        '</td>' +

      '</tr>'
    );
  }).join('');
}

// ============================================================
// _updateHistSummary
// ============================================================
function _updateHistSummary(data) {
  var total   = data.length;
  var inCnt   = data.filter(function(i) { return i.txnType === 'IN'; }).length;
  var outCnt  = data.filter(function(i) { return i.txnType === 'OUT'; }).length;
  var initCnt = data.filter(function(i) { return i.txnType === 'INITIAL'; }).length;
  var adjCnt  = data.filter(function(i) {
    return i.txnType === 'ADJUST_IN' || i.txnType === 'ADJUST_OUT';
  }).length;

  var summaryEl = document.getElementById('histSummaryText');
  var chipsEl   = document.getElementById('histSummaryChips');

  if (summaryEl) summaryEl.textContent = 'พบ ' + total + ' รายการ';

  var chips = '';
  if (inCnt   > 0) chips += '<span class="chip chip-green">' + inCnt   + ' รับเข้า</span>';
  if (outCnt  > 0) chips += '<span class="chip chip-red">'   + outCnt  + ' เบิกออก</span>';
  if (initCnt > 0) chips += '<span class="chip chip-blue">'  + initCnt + ' เริ่มต้น</span>';
  if (adjCnt  > 0) chips += '<span class="chip chip-gray">'  + adjCnt  + ' ปรับ</span>';

  if (chipsEl) chipsEl.innerHTML = chips;
}
</script></template>

<script>
var allAdminProducts = [];

function loadAdminProducts() {
  showLoading('กำลังโหลดสินค้า...');
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (!result.success) { showToast(result.message, 'error'); return; }
      allAdminProducts = result.data || [];
      renderAdminProducts(allAdminProducts);
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast(err.message, 'error');
    })
    .getProducts();
}

function filterAdminProducts() {
  const search = (document.getElementById('apSearch').value || '').toLowerCase();
  const filtered = !search ? allAdminProducts : allAdminProducts.filter(function(p) {
    return p.productName.toLowerCase().includes(search) ||
           p.barcode.toLowerCase().includes(search) ||
           p.sku.toLowerCase().includes(search);
  });
  renderAdminProducts(filtered);
}

function renderAdminProducts(products) {
  const container = document.getElementById('adminProductList');
  if (!products || products.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>ไม่พบสินค้า</p></div>';
    return;

  container.innerHTML = products.map(function(p) {
    return `

        <div class="flex items-start justify-between gap-3">
          <div class="flex-1 min-w-0">

            <button onclick="confirmDeleteProduct('${escapeHtml(p.productId)}', '${escapeHtml(p.productName)}')"

          </div>
        </div>
      </div>
    `;
  }).join('');

function openEditProduct(productId) {
  const product = allAdminProducts.find(function(p) { return p.productId === productId; });
  if (!product) return;

  document.getElementById('editProductId').value      = product.productId;
  document.getElementById('editProductName').value    = product.productName;
  document.getElementById('editUnit').value           = product.unit;
  document.getElementById('editReorderPoint').value   = product.reorderPoint;
  document.getElementById('editPackSize').value       = product.packSize;
  document.getElementById('editCategory').value       = product.category;
  document.getElementById('editDefaultRemark').value  = product.defaultRemark;
  document.getElementById('editActive').value         = String(product.active);
  document.getElementById('editProductModal').classList.remove('hidden');

function closeEditProductModal() {
  document.getElementById('editProductModal').classList.add('hidden');
}

function saveEditProduct() {
  const data = {
    productId:     document.getElementById('editProductId').value,
    productName:   document.getElementById('editProductName').value.trim(),
    unit:          document.getElementById('editUnit').value,
    reorderPoint:  document.getElementById('editReorderPoint').value,
    packSize:      document.getElementById('editPackSize').value.trim(),
    category:      document.getElementById('editCategory').value,

    active:        document.getElementById('editActive').value === 'true'
  };

  if (!data.productName) {

    return;

  showLoading('กำลังบันทึก...');
  google.script.run
    .withSuccessHandler(function(result) {

      closeEditProductModal();

      showToast(err.message, 'error');

function confirmDeleteProduct(productId, productName) {

    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#ef4444'
  }).then(function(r) {
    if (!r.isConfirmed) return;

      .withSuccessHandler(function(result) {
        hideLoading();

        else showToast(result.message, 'error');
      })
      .withFailureHandler(function(err) { hideLoading(); showToast(err.message, 'error'); })
      .deleteProduct(productId);

<script>
var isEditingUser = false;
var allUsers = [];

function loadAdminUsers() {
  showLoading('กำลังโหลดผู้ใช้...');
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (!result.success) { showToast(result.message, 'error'); return; }
      allUsers = result.data || [];
      renderAdminUsers(allUsers);
    })
    .withFailureHandler(function(err) { hideLoading(); showToast(err.message, 'error'); })
    .getUsers();
}

function renderAdminUsers(users) {
  const container = document.getElementById('adminUserList');
  if (!users || users.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>ไม่พบผู้ใช้งาน</p></div>';
    return;
  }
  const roleColors = { Admin:'chip-red', Staff:'chip-blue', Viewer:'chip-gray', Purchasing:'chip-green' };
  container.innerHTML = users.map(function(u) {
    return `
      <div class="bg-white rounded-xl p-4 shadow-sm flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center flex-shrink-0 text-blue-600 font-bold text-sm">

        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-sm font-bold text-gray-900">${escapeHtml(u.fullName)}</span>
            <span class="chip ${roleColors[u.role] || 'chip-gray'}">${escapeHtml(u.role)}</span>

  document.getElementById('editUsername').value     = '';
  document.getElementById('editUserPassword').value = '';

  document.getElementById('editUserRole').value     = 'Staff';
  document.getElementById('editUsername').disabled  = false;
  document.getElementById('editStatusSection').classList.add('hidden');
  document.getElementById('userModal').classList.remove('hidden');
}

function openEditUserModal(userId) {
  const user = allUsers.find(function(u) { return u.userId === userId; });
  if (!user) return;
  isEditingUser = true;
  document.getElementById('userModalTitle').textContent  = 'แก้ไขผู้ใช้';
  document.getElementById('editUserId').value            = user.userId;
  document.getElementById('editUsername').value          = user.username;
  document.getElementById('editUsername').disabled       = true;
  document.getElementById('editUserPassword').value      = '';
  document.getElementById('editUserFullName').value      = user.fullName;
  document.getElementById('editUserRole').value          = user.role;
  document.getElementById('editUserStatus').value        = user.status;
  document.getElementById('editStatusSection').classList.remove('hidden');
  document.getElementById('userModal').classList.remove('hidden');
}

function closeUserModal() {
  document.getElementById('userModal').classList.add('hidden');
}

function saveUser() {
  const fullName = document.getElementById('editUserFullName').value.trim();
  const password = document.getElementById('editUserPassword').value;
  const username = document.getElementById('editUsername').value.trim();

  if (!fullName) { showToast('กรุณากรอกชื่อ-นามสกุล', 'warning'); return; }
  if (!isEditingUser && !username) { showToast('กรุณากรอก Username', 'warning'); return; }
  if (!isEditingUser && !password) { showToast('กรุณากรอก Password', 'warning'); return; }

  const data = {
    userId:   document.getElementById('editUserId').value,
    username: username,
    password: password,
    fullName: fullName,
    role:     document.getElementById('editUserRole').value,
    status:   document.getElementById('editUserStatus').value || 'Active'
  };

  showLoading('กำลังบันทึก...');
  const fn = isEditingUser ? 'updateUser' : 'saveUser';
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      closeUserModal();
      if (result.success) { showToast(result.message, 'success'); loadAdminUsers(); }
      else showToast(result.message, 'error');

    title: 'ระงับบัญชี?',
    text: 'ระงับบัญชี "' + fullName + '" ใช่หรือไม่?',

        <label class="form-label">Group ID / User ID ผู้รับแจ้งเตือน</label>
        <input type="text" id="cfgLineGroupId" class="form-input" placeholder="C... หรือ U...">
        <p class="text-xs text-gray-400 mt-1">Group ID ขึ้นต้นด้วย C, User ID ขึ้นต้นด้วย U</p>
      </div>

      <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
        <label class="text-sm font-medium text-gray-700">เปิดใช้งานแจ้งเตือน LINE</label>
        <div class="ml-auto">
          <label class="flex items-center gap-2 cursor-pointer">
            <div class="relative">
              <input type="checkbox" id="cfgEnableLine" class="sr-only peer">
              <div class="w-10 h-5 bg-gray-200 rounded-full peer-checked:bg-green-500 transition-colors"></div>
              <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5 shadow"></div>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- Test LINE -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="text-sm font-semibold text-gray-700 mb-3">ทดสอบการเชื่อมต่อ LINE</div>
      <button onclick="testLineNotification()" id="testLineBtn"
              class="btn btn-success btn-full">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        ส่งข้อความทดสอบ LINE
      </button>
      <p id="testLineResult" class="text-sm text-center mt-2 font-medium hidden"></p>
    </div>

    <!-- Save Button -->
    <button onclick="saveSystemConfig()" class="btn btn-primary btn-full btn-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
      </svg>
      บันทึกการตั้งค่า
    </button>

    <!-- Init System Button -->
    <div class="bg-yellow-50 rounded-2xl p-4 border border-yellow-200">
      <div class="text-sm font-semibold text-yellow-800 mb-2">⚠️ จัดการระบบ</div>
      <p class="text-xs text-yellow-700 mb-3">ปุ่มด้านล่างจะ rebuild ข้อมูล StockOnHand จาก Transactions ทั้งหมด</p>
      <button onclick="rebuildStock()" class="btn btn-warning btn-sm btn-full">
        🔄 Rebuild Stock On Hand
      </button>
    </div>
  </div>
</div>

<script>
function loadSystemConfig() {
  showLoading('กำลังโหลดการตั้งค่า...');
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (!result) return;
      document.getElementById('cfgSystemName').value   = result.systemName   || '';
      document.getElementById('cfgHospitalName').value = result.hospitalName  || '';
      document.getElementById('cfgExpiryDays').value   = result.expiryWarningDays || 90;
      document.getElementById('cfgLineToken').value    = result.lineChannelAccessToken || '';
      document.getElementById('cfgLineGroupId').value  = result.lineGroupId   || '';
      document.getElementById('cfgEnableLine').checked = result.enableLineAlert === true;
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('โหลดการตั้งค่าไม่สำเร็จ: ' + err.message, 'error');
    })
    .getSystemConfig();
}

function saveSystemConfig() {
  const data = {
    systemName:              document.getElementById('cfgSystemName').value.trim(),
    hospitalName:            document.getElementById('cfgHospitalName').value.trim(),
    expiryWarningDays:       document.getElementById('cfgExpiryDays').value,
    lineChannelAccessToken:  document.getElementById('cfgLineToken').value.trim(),
    lineGroupId:             document.getElementById('cfgLineGroupId').value.trim(),
    enableLineAlert:         document.getElementById('cfgEnableLine').checked
  };

  showLoading('กำลังบันทึก...');
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (result.success) showToast(result.message, 'success');
      else showToast(result.message, 'error');
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast(err.message, 'error');
    })
    .saveSystemConfig(data);
}

function testLineNotification() {
  const btn    = document.getElementById('testLineBtn');
  const result = document.getElementById('testLineResult');
  btn.disabled = true;
  btn.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span> กำลังส่ง...';
  result.classList.add('hidden');

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> ส่งข้อความทดสอบ LINE';
      result.classList.remove('hidden');
      if (res.success) {
        result.className = 'text-sm text-center mt-2 font-medium text-green-600';
        result.textContent = '✅ ส่ง LINE สำเร็จ';
      } else {
        result.className = 'text-sm text-center mt-2 font-medium text-red-600';
        result.textContent = '❌ ' + res.message;
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg> ส่งข้อความทดสอบ LINE';
      result.classList.remove('hidden');
      result.className = 'text-sm text-center mt-2 font-medium text-red-600';
      result.textContent = '❌ Error: ' + err.message;
    })
    .testLineMessage();
}

function rebuildStock() {
  Swal.fire({
    icon: 'warning',
    title: 'Rebuild Stock?',
    text: 'ระบบจะคำนวณ StockOnHand ใหม่ทั้งหมดจาก Transactions ใช้เวลาสักครู่',
    showCancelButton: true,
    confirmButtonText: 'ดำเนินการ',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#f59e0b'
  }).then(function(r) {
    if (!r.isConfirmed) return;
    showLoading('กำลัง Rebuild Stock...');
    google.script.run
      .withSuccessHandler(function(count) {
        hideLoading();
        showToast('Rebuild สำเร็จ: ' + count + ' LOT', 'success');
      })
      .withFailureHandler(function(err) {
        hideLoading();
        showToast('Rebuild ไม่สำเร็จ: ' + err.message, 'error');
      })
      .rebuildStockOnHand();
  });
}
</script></template>
  <template id="tpl-scanner">       <div id="scannerModal" class="">
  <div class="relative flex flex-col items-center gap-4 w-full max-w-sm mx-4">

          <div class="absolute top-0 left-0 w-5 h-5 border-t-4 border-l-4 border-blue-400 rounded-tl-lg"></div>
          <div class="absolute top-0 right-0 w-5 h-5 border-t-4 border-r-4 border-blue-400 rounded-tr-lg"></div>
          <div class="absolute bottom-0 left-0 w-5 h-5 border-b-4 border-l-4 border-blue-400 rounded-bl-lg"></div>
          <div class="absolute bottom-0 right-0 w-5 h-5 border-b-4 border-r-4 border-blue-400 rounded-br-lg"></div>

    <!-- Status -->
    <p id="scannerStatus" class="text-white text-sm text-center font-medium">

    <!-- Manual Input Fallback -->
    <div class="w-full bg-white bg-opacity-10 rounded-xl p-3">
      <p class="text-white text-xs font-medium mb-2 text-center">

      <div class="flex gap-2">
        <input type="text" id="scannerManualInput"
               class="flex-1 bg-white rounded-lg px-3 py-2 text-sm font-medium text-gray-900 outline-none"

               onkeydown="if(event.key==='Enter') confirmManualBarcode()">
        <button onclick="confirmManualBarcode()"
                class="btn btn-primary btn-sm px-3">ยืนยัน</button>

    </div>

    <!-- Close -->
    <button onclick="closeScannerModal()" class="btn btn-secondary btn-full">
      ยกเลิก
    </button>
  </div>
</div>

<script>
function confirmManualBarcode() {
  var input = document.getElementById('scannerManualInput');
  if (!input) return;
  var val = input.value.trim();
  if (!val) return;
  if (onBarcodeDetectedCallback) onBarcodeDetectedCallback(val);
  closeScannerModal();
}
</script></template>

  <!-- Global JavaScript -->
  <script src="app.js"></script>

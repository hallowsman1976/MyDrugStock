  <!-- ZXing Barcode Scanner
       ใช้ jsdelivr แทน unpkg เพราะเสถียรกว่าใน GAS environment
       โหลด async และมี fallback -->
  <script>
    // โหลด ZXing จาก jsdelivr (primary)
    (function() {
      var script   = document.createElement('script');
      script.async = true;
      script.src   = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js';

      script.onload = function() {
        console.log('ZXing loaded from jsdelivr');
        window._zxingLoaded = true;
      };

      script.onerror = function() {
        console.warn('ZXing jsdelivr failed, trying cdnjs...');
        // fallback → cdnjs
        var fallback   = document.createElement('script');
        fallback.async = true;
        fallback.src   = 'https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.19.1/umd/index.min.js';

        fallback.onload = function() {
          console.log('ZXing loaded from cdnjs');
          window._zxingLoaded = true;
        };

        fallback.onerror = function() {
          console.error('ZXing failed to load from all CDNs');
          window._zxingLoaded = false;
        };

        document.head.appendChild(fallback);
      };

      document.head.appendChild(script);
    })();
  </script>

(function () {
  // จดจำ username จากครั้งก่อน
  try {
    var saved = localStorage.getItem('drugstore_remember_user');
    if (saved) {
      var u = document.getElementById('loginUsername');
      var r = document.getElementById('rememberMe');
      if (u) u.value = saved;
      if (r) r.checked = true;
      if (u) { var p = document.getElementById('loginPassword'); if (p) p.focus(); }
    }
  } catch (e) {}

  // บันทึก/ลบ username เมื่อกดเข้าสู่ระบบ (ทำงานควบคู่กับ handleLogin)
  var btn = document.getElementById('loginBtn');
  if (btn) btn.addEventListener('click', function () {
    try {
      var u = document.getElementById('loginUsername');
      var r = document.getElementById('rememberMe');
      if (r && r.checked && u && u.value.trim())
        localStorage.setItem('drugstore_remember_user', u.value.trim());
      else
        localStorage.removeItem('drugstore_remember_user');
    } catch (e) {}
  });
})();

function togglePasswordVisibility() {
  var input = document.getElementById('loginPassword');
  var open  = document.getElementById('eyeIcon');
  var off   = document.getElementById('eyeOffIcon');
  if (!input) return;
  var show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  if (open) open.style.display = show ? 'none' : 'block';
  if (off)  off.style.display  = show ? 'block' : 'none';
}

function socialLogin(provider) {
  var name = provider === 'google' ? 'Google' : 'Facebook';
  if (typeof Swal !== 'undefined') {
    Swal.fire({
      icon: 'info', title: 'เข้าสู่ระบบด้วย ' + name,

      confirmButtonColor: '#7c3aed'
    });
  } else { alert('ยังไม่เปิดใช้งาน กรุณาเข้าสู่ระบบด้วย Username/Password'); }
}

function showForgotPassword() {
  if (typeof Swal !== 'undefined') {
    Swal.fire({
      icon: 'info', title: 'ลืมรหัสผ่าน?',
      text: 'กรุณาติดต่อผู้ดูแลระบบ (Admin) เพื่อรีเซ็ตรหัสผ่านให้',

}
</script>

<script>
function loadInitialStock() {
  showLoading('กำลังโหลดรายการยา...');
  // ยิง 2 คำขอพร้อมกัน (products + คงเหลือ) แล้วรวมผลเมื่อครบ — เร็วกว่าเรียงต่อกัน
  var products = null, bal = null, done = 0, failed = false;
  function join() {
    if (++done < 2) return;
    hideLoading();
    if (products === null) { showToast('โหลดสินค้าไม่สำเร็จ', 'error'); return; }
    window.__isBal = bal || {};
    renderInitialStock(products.filter(function(p){ return p.active; }));
  }
  google.script.run
    .withSuccessHandler(function(prodRes) { products = (prodRes && prodRes.success) ? (prodRes.data || []) : []; join(); })
    .withFailureHandler(function() { products = null; join(); })
    .getProducts();
  google.script.run
    .withSuccessHandler(function(stockRes) {
      bal = {};
      ((stockRes && stockRes.data) || []).forEach(function(s){ bal[s.barcode] = (bal[s.barcode] || 0) + (Number(s.qtyBalance) || 0); });
      join();
    })
    .withFailureHandler(function() { bal = {}; join(); })
    .getStockOnHand({});
}

function renderInitialStock(products) {
  var list  = document.getElementById('isList');
  var empty = document.getElementById('isEmpty');
  var count = document.getElementById('isCount');
  var bal   = window.__isBal || {};

  if (count) count.textContent = 'รายการยา (' + products.length + ')';

  if (!products.length) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.innerHTML = products.map(function(p){
    var b   = bal[p.barcode] || 0;
    var key = (p.productName + ' ' + p.barcode + ' ' + (p.sku||'')).toLowerCase();
    var balHtml = b > 0
      ? '<span class="chip chip-green">คงเหลือ ' + b + ' ' + escapeHtml(p.unit||'') + '</span>'
      : '<span class="chip chip-gray">ยังไม่มีสต็อก</span>';
    return ''
      + '<div class="card" data-init-row data-key="' + escapeHtml(key) + '" data-barcode="' + escapeHtml(p.barcode) + '" data-unit="' + escapeHtml(p.unit||'') + '">'
      +   '<div class="flex items-start justify-between gap-2">'
      +     '<div>'
      +       '<div style="font-weight:600;color:var(--text);">' + escapeHtml(p.productName) + '</div>'
      +       '<div style="font-size:12px;color:var(--text-2);margin-top:2px;">' + escapeHtml(p.barcode) + ' · หน่วย: ' + escapeHtml(p.unit||'-') + '</div>'
      +     '</div>'
      +     balHtml
      +   '</div>'
      +   '<div class="is-grid">'
      +     '<input type="number" min="0" step="1" class="form-input is-qty" placeholder="จำนวนตั้งต้น" oninput="isTouch(this)">'
      +     '<input type="text" class="form-input is-lot" placeholder="LOT NUMBER">'
      +     '<input type="date" class="form-input is-exp">'
      +   '</div>'
      + '</div>';
  }).join('');
}

// ไฮไลต์การ์ดที่กรอกจำนวนแล้ว
function isTouch(inp){
  var card = inp.closest('[data-init-row]');
  if (!card) return;
  if ((Number(inp.value)||0) > 0) card.classList.add('is-hasqty');
  else card.classList.remove('is-hasqty');
}

// กรองด้วยการซ่อน/แสดง (ไม่ re-render เพื่อไม่ให้ค่าที่กรอกหาย)
function filterInitialStock(){
  var q = (document.getElementById('isSearch').value || '').toLowerCase().trim();
  document.querySelectorAll('#isList [data-init-row]').forEach(function(card){
    card.style.display = (!q || (card.dataset.key||'').indexOf(q) !== -1) ? '' : 'none';
  });
}

function submitInitialStock(){
  var cards = document.querySelectorAll('#isList [data-init-row]');
  var items = [];
  var invalid = 0;

  cards.forEach(function(card){
    var qty = Number(card.querySelector('.is-qty').value) || 0;
    if (qty <= 0) return;
    var lot = (card.querySelector('.is-lot').value || '').trim();
    var exp = card.querySelector('.is-exp').value; // yyyy-mm-dd
    if (lot.length < 2 || !exp) { invalid++; card.classList.add('is-hasqty'); return; }
    items.push({ barcode: card.dataset.barcode, qty: qty, lotNumber: lot, expiryDate: exp });
  });

  if (invalid > 0) {
    Swal.fire({ icon:'warning', title:'ข้อมูลไม่ครบ',
      text: 'มี ' + invalid + ' รายการที่กรอกจำนวนแล้วแต่ยังไม่ได้ระบุ LOT หรือวันหมดอายุ',
      confirmButtonColor:'#7c3aed' });
    return;
  }
  if (!items.length) {
    showToast('กรุณากรอกจำนวนอย่างน้อย 1 รายการ', 'warning');
    return;
  }

  Swal.fire({
    icon:'question', title:'ยืนยันตั้งค่าสต็อกเริ่มต้น?',
    html:'จะบันทึกยอดยกมาจำนวน <b>' + items.length + '</b> รายการ',
    showCancelButton:true, confirmButtonText:'บันทึก', cancelButtonText:'ยกเลิก',
    confirmButtonColor:'#4f46e5', cancelButtonColor:'#6b7280'
  }).then(function(r){
    if (!r.isConfirmed) return;
    showLoading('กำลังบันทึกสต็อกเริ่มต้น...');
    google.script.run
      .withSuccessHandler(function(res){
        hideLoading();
        if (res && res.success) {
          Swal.fire({ icon:'success', title:'สำเร็จ', text: res.message, timer:1800, showConfirmButton:false });
          loadInitialStock();
        } else {
          showToast((res && res.message) || 'บันทึกไม่สำเร็จ', 'error');
        }
      })
      .withFailureHandler(function(err){
        hideLoading();
        showToast('บันทึกไม่สำเร็จ: ' + (err && err.message || ''), 'error');
      })
      .saveInitialStock(items);
  });
}
</script>
</template>
  <template id="tpl-monthly-form">
<div class="pb-4">
  <div class="page-header">
    <h1>แบบฟอร์มเบิกยาประจำเดือน</h1>
    <p>สร้างไฟล์ Excel รายการยาพร้อมยอดคงเหลือปัจจุบัน สำหรับเบิกประจำเดือน (จัดกลุ่มตามหมวดหมู่ พิมพ์ A4)</p>
  </div>

  <div class="card" style="max-width:640px;margin:14px 16px;padding:20px;">
    <div style="display:grid;grid-template-columns:1fr;gap:14px;">
      <div>
        <label class="form-label">ชื่อ รพ.สต. / หน่วยงาน</label>
        <input id="mfRpst" class="form-input" placeholder="เช่น รพ.สต.ทรายไหลแล้ง">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">

      <button id="mfBtn" class="btn btn-success btn-lg" onclick="generateMonthlyForm()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        </svg>
        สร้างและดาวน์โหลด Excel
      </button>
      <p style="font-size:12px;color:var(--text-3);margin:0;">
        * rate = อัตราการใช้ต่อเดือน (เฉลี่ยจากยอดจ่ายออกในระบบ) · คงเหลือยกมา = คงเหลือล่าสุด · ช่อง เบิก/จ่าย/มูลค่า เว้นให้กรอกเอง
      </p>
    </div>
  </div>
</div>

<script>
(function(){
  var months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  window.__mfMonths = months;
  var sel = document.getElementById('mfMonth');
  if (sel && !sel.options.length){
    var now = new Date();
    months.forEach(function(m,i){ var o=document.createElement('option'); o.value=m; o.textContent=m; if(i===now.getMonth()) o.selected=true; sel.appendChild(o); });
    var y = document.getElementById('mfYear'); if(y) y.value = now.getFullYear() + 543;
  }
})();

function loadMonthlyForm(){
  var info = document.getElementById('mfInfo');
  if (info) info.textContent = 'กำลังตรวจจำนวนรายการยา...';
  google.script.run
    .withSuccessHandler(function(res){
      var n = (res && res.data ? res.data.filter(function(p){return p.active;}).length : 0);
      if (info) info.textContent = 'พบยาที่เปิดใช้งาน ' + n + ' รายการ พร้อมสร้างฟอร์ม';
    })
    .withFailureHandler(function(){ if(info) info.textContent=''; })
    .getProducts();
}

function ensureExcelJS(cb){
  if (window.ExcelJS) return cb();
  showLoading('กำลังโหลดตัวสร้าง Excel...');
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
  s.onload = function(){ cb(); };
  s.onerror = function(){ hideLoading(); showToast('โหลดไลบรารี Excel ไม่สำเร็จ (ตรวจอินเทอร์เน็ต)', 'error'); };
  document.head.appendChild(s);
}

function generateMonthlyForm(){
  var products = null, bal = null, txns = null, done = 0;
  showLoading('กำลังดึงข้อมูลยา + ประวัติการจ่าย...');
  function join(){
    if (++done < 3) return;
    if (products === null){ hideLoading(); showToast('ดึงข้อมูลยาไม่สำเร็จ', 'error'); return; }
    // rate = อัตราการใช้ต่อเดือน จาก Transactions column J (qtyOut) หารจำนวนเดือนที่มีข้อมูล
    var usage = {}, monthsSet = {};
    (txns || []).forEach(function(t){
      if (t.status === 'Void') return;
      var q = Number(t.qtyOut) || 0;
      if (q > 0) usage[t.barcode] = (usage[t.barcode] || 0) + q;
      var d = String(t.timestamp || '').split(' ')[0].split('/'); // [dd,MM,yyyy]
      if (d.length === 3) monthsSet[d[1] + '/' + d[2]] = 1;
    });
    var nMonths = Math.max(Object.keys(monthsSet).length, 1);
    var rate = {};
    Object.keys(usage).forEach(function(bc){ rate[bc] = usage[bc] / nMonths; });
    buildMonthlyWorkbook(products.filter(function(p){return p.active;}), bal || {}, rate);
  }
  google.script.run
    .withSuccessHandler(function(r){ products = (r && r.success) ? (r.data||[]) : []; join(); })
    .withFailureHandler(function(){ products = null; join(); })
    .getProducts();
  google.script.run
    .withSuccessHandler(function(r){ bal = {}; ((r&&r.data)||[]).forEach(function(s){ bal[s.barcode]=(bal[s.barcode]||0)+(Number(s.qtyBalance)||0); }); join(); })
    .withFailureHandler(function(){ bal = {}; join(); })
    .getStockOnHand({});
  google.script.run
    .withSuccessHandler(function(r){ txns = (r && r.data) ? r.data : []; join(); })
    .withFailureHandler(function(){ txns = []; join(); })
    .getTransactions({ limit: 100000 });
}

function buildMonthlyWorkbook(products, balMap, rateMap){
  rateMap = rateMap || {};
  ensureExcelJS(function(){
    try{
      showLoading('กำลังสร้างไฟล์ Excel...');
      var FONT='TH Sarabun New';
      var rpst=(document.getElementById('mfRpst').value||'').trim();
      var amphoe=(document.getElementById('mfAmphoe').value||'').trim();
      var changwat=(document.getElementById('mfChangwat').value||'').trim();
      var month=document.getElementById('mfMonth').value||'';
      var year=(document.getElementById('mfYear').value||'').trim();

      var wb=new ExcelJS.Workbook();
      var ws=wb.addWorksheet('เบิกยา', {
        pageSetup:{ paperSize:9, orientation:'portrait', fitToPage:true, fitToWidth:1, fitToHeight:0, horizontalCentered:true,
          margins:{left:0.4,right:0.4,top:0.55,bottom:0.5,header:0.2,footer:0.2} },
        headerFooter:{ oddFooter:'&Cหน้า &P / &N' }
      });
      var widths=[5,11,34,10,9,10,8,8,11,13];
      ws.columns = widths.map(function(w){return {width:w};});
      var NCOL=10, LAST='J';
      var thin={style:'thin',color:{argb:'FF000000'}};
      var border={top:thin,left:thin,bottom:thin,right:thin};
      function f(cell,o){o=o||{};cell.font={name:FONT,size:o.size||14,bold:!!o.bold};}
      function ctr(cell,w){cell.alignment={horizontal:'center',vertical:'middle',wrapText:!!w};}
      function lft(cell){cell.alignment={horizontal:'left',vertical:'middle',indent:1};}

      ws.mergeCells('A1:J1'); var c=ws.getCell('A1'); c.value='แบบฟอร์มเบิกยา / เวชภัณฑ์ ประจำเดือน'; f(c,{size:20,bold:true}); ctr(c); ws.getRow(1).height=30;
      ws.mergeCells('A2:J2'); c=ws.getCell('A2');
      c.value='โรงพยาบาลส่งเสริมสุขภาพตำบล '+(rpst||'..............................')+'   อำเภอ '+(amphoe||'......................')+'   จังหวัด '+(changwat||'......................');
      f(c,{size:15}); ctr(c); ws.getRow(2).height=24;
      ws.mergeCells('A3:J3'); c=ws.getCell('A3'); c.value='ประจำเดือน '+(month||'........................')+'   พ.ศ. '+(year||'..............'); f(c,{size:15}); c.alignment={horizontal:'center',vertical:'middle'}; ws.getRow(3).height=24;

      var headers=['ลำดับ','รหัส','รายการเวชภัณฑ์ (ชื่อสามัญทางยา)','ขนาดบรรจุ\n(PACK)','rate\n(อัตราใช้/เดือน)','คงเหลือ\nยกมา','เบิก','จ่าย','มูลค่า','หมายเหตุ'];
      var hr=ws.getRow(5);
      headers.forEach(function(h,i){var cell=hr.getCell(i+1);cell.value=h;f(cell,{size:13,bold:true});ctr(cell,true);cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFBDD7EE'}};cell.border=border;});
      hr.height=34;
      var HEADER_ROW=5, r=6;

      // group by category (encounter order)
      var order=[], groups={};
      products.forEach(function(p){ var cat=(p.category||'').trim()||'อื่น ๆ'; if(!groups[cat]){groups[cat]=[];order.push(cat);} groups[cat].push(p); });

      order.forEach(function(cat){
        ws.mergeCells('A'+r+':'+LAST+r);
        var sc=ws.getCell('A'+r); sc.value='หมวด : '+cat; f(sc,{size:14,bold:true}); lft(sc);
        sc.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFDDEBF7'}};
        for(var ci=1;ci<=NCOL;ci++) ws.getCell(r,ci).border=border;
        ws.getRow(r).height=22; r++;
        var list=groups[cat].slice().sort(function(a,b){return String(a.productName).localeCompare(String(b.productName),'th');});
        list.forEach(function(p,idx){
          var row=ws.getRow(r);
          // A ลำดับ | B รหัส | C รายการ | D PACK | E rate(อัตราใช้/เดือน) | F คงเหลือยกมา | G เบิก | H จ่าย | I มูลค่า(ว่าง) | J หมายเหตุ
          var rv=rateMap[p.barcode]; var rateVal=(rv&&rv>0)?(Math.round(rv*10)/10):'';
          var vals=[ idx+1, (p.sku||p.barcode||''), (p.productName||''), (p.packSize||p.unit||''), rateVal, (balMap[p.barcode]||0), '', '', '', '' ];
          for(var ci=1;ci<=NCOL;ci++){ var cell=row.getCell(ci); cell.value=vals[ci-1]; cell.border=border; f(cell,{size:14});
            if(ci===3) lft(cell); else ctr(cell); }
          row.height=20; r++;
        });
      });

      // signatures
      r+=2;
      var groupsSig=[[1,4,'ลงชื่อ ...................................... ผู้จัดทำ / ผู้เบิก'],[5,7,'ลงชื่อ ...................................... ผู้จ่าย / ผู้ตรวจสอบ'],[8,10,'ลงชื่อ ...................................... ผู้อนุมัติ']];
      function sig(text,c1,c2,rr){ ws.mergeCells(rr,c1,rr,c2); var cell=ws.getCell(rr,c1); cell.value=text; f(cell,{size:14}); ctr(cell); }
      groupsSig.forEach(function(g){sig(g[2],g[0],g[1],r);}); r++;
      groupsSig.forEach(function(g){sig('( ...................................... )',g[0],g[1],r);}); r++;
      groupsSig.forEach(function(g){sig('ตำแหน่ง ..........................................',g[0],g[1],r);}); r++;
      groupsSig.forEach(function(g){sig('วันที่ .......... / .......... / ..........',g[0],g[1],r);});

      ws.views=[{state:'frozen',ySplit:HEADER_ROW}];
      try{ ws.pageSetup.printTitlesRow='1:'+HEADER_ROW; }catch(e){}

      wb.xlsx.writeBuffer().then(function(buf){
        var blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
        a.download='แบบฟอร์มเบิกยา_'+(month||'')+'_'+(year||'')+'.xlsx';
        document.body.appendChild(a); a.click();
        setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },1500);
        hideLoading();
        showToast('สร้างไฟล์สำเร็จ ('+products.length+' รายการ)', 'success');
      }).catch(function(e){ hideLoading(); showToast('สร้างไฟล์ไม่สำเร็จ: '+e.message,'error'); });
    }catch(err){ hideLoading(); showToast('เกิดข้อผิดพลาด: '+err.message,'error'); }
  });
}
</script>
</template>

<script>
// ============================================================
// loadDashboard - โหลดข้อมูล dashboard
// ============================================================
function loadDashboard() {
  showLoading('กำลังโหลดแดชบอร์ด...');

  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (!result.success) {
        showToast(result.message, 'error');
        return;
      }
      renderDashboard(result.data);
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('โหลดแดชบอร์ดไม่สำเร็จ: ' + err.message, 'error');
    })
    .getDashboardData();
}

// ============================================================
// renderDashboard - แสดงข้อมูลในหน้า dashboard
// ============================================================
function renderDashboard(data) {
  // อัปเดตเวลา
  document.getElementById('dashLastUpdate').textContent = 'อัปเดต: ' + data.lastUpdate;

  // ---- Stats Cards ----
  const s = data.stats;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card" onclick="switchPage('stock-table')">
      <div class="stat-icon bg-blue-100">
        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
      </div>
      <div class="stat-value text-blue-600">${formatNumber(s.totalProducts)}</div>

  const container = document.getElementById('recentTxnList');
  if (!txns || txns.length === 0) {
    container.innerHTML = `
      <div class="empty-state">

        </svg>
        <p>ยังไม่มีรายการ</p>
      </div>
    `;
    return;
  }

  container.innerHTML = txns.map(function(txn) {
    const isIn   = txn.txnType === 'IN' || txn.txnType === 'INITIAL' || txn.txnType === 'ADJUST_IN';
    const qtyStr = isIn
      ? '<span class="text-green-600 font-bold">+' + formatNumber(txn.qtyIn) + '</span>'
      : '<span class="text-red-600 font-bold">-' + formatNumber(txn.qtyOut) + '</span>';
    const bgColor = isIn ? 'bg-green-50' : 'bg-red-50';
    const iconColor = isIn ? 'text-green-600' : 'text-red-600';
    const iconBg    = isIn ? 'bg-green-100' : 'bg-red-100';
    return `
      <div class="bg-white rounded-xl p-3 shadow-sm flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl ${iconBg} flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 ${iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            ${isIn
              ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4"/>'
              : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8V20M17 20l4-4m-4 4l-4-4"/>'}
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-gray-900 truncate">${escapeHtml(txn.productName)}</div>
          <div class="text-xs text-gray-400">LOT: ${escapeHtml(txn.lotNumber)} · ${escapeHtml(txn.timestamp)}</div>

        <div class="text-right flex-shrink-0">

          <div class="text-xs text-gray-400">${escapeHtml(txn.fullName)}</div>
        </div>

    `;
  }).join('');

function loadDrugList() {
  if (_drugLoaded) return;

  var badge = document.getElementById('apDrugLoadingBadge');
  if (badge) badge.classList.remove('hidden');

  google.script.run
    .withSuccessHandler(function(result) {
      if (badge) badge.classList.add('hidden');
      if (result && result.success) {
        _drugList   = result.data || [];
        _drugLoaded = true;
      } else {
        showToast('โหลดรายการยาไม่สำเร็จ: ' + (result ? result.message : ''), 'warning');
      }
    })
    .withFailureHandler(function(err) {
      if (badge) badge.classList.add('hidden');
      showToast('โหลดรายการยาไม่สำเร็จ', 'warning');
    })
    .getDrugList();
}

// ============================================================
// onDrugFocus
// ============================================================
function onDrugFocus() {
  if (!_drugLoaded) { loadDrugList(); return; }
  var kw = document.getElementById('apProductName').value;
  onDrugSearch(kw);
}

// ============================================================
// onDrugSearch - filter + render dropdown
// ============================================================
function onDrugSearch(keyword) {
  if (!_drugLoaded) { loadDrugList(); return; }

  var dropdown = document.getElementById('apDrugDropdown');
  var clearBtn = document.getElementById('apProductNameClear');
  if (!dropdown) return;

  keyword = (keyword || '').trim();
  if (clearBtn) clearBtn.classList.toggle('hidden', !keyword && !_selectedDrug);

  var filtered = keyword
    ? _drugList.filter(function(d) {
        return d.name.toLowerCase().includes(keyword.toLowerCase()) ||
               d.sku.toLowerCase().includes(keyword.toLowerCase());
      })
    : _drugList;

  if (filtered.length === 0) {
    dropdown.innerHTML =
      '<div style="padding:16px;text-align:center;color:#9ca3af;font-size:13px;">' +
        'ไม่พบรายการ "' + escapeHtml(keyword) + '"' +
      '</div>';
    dropdown.classList.remove('hidden');
    return;
  }

  _drugDropdownIdx = -1;

  dropdown.innerHTML = filtered.map(function(d, i) {
    // highlight keyword
    var highlighted = keyword
      ? d.name.replace(
          new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'),
          '<mark style="background:#fef08a;border-radius:2px;padding:0 1px;">$1</mark>'
        )
      : escapeHtml(d.name);

    var isSelected = _selectedDrug && _selectedDrug.name === d.name;

    return (
      '<div class="drug-dd-item"' +
           ' data-idx="'      + i                  + '"' +
           ' data-name="'     + escapeHtml(d.name)     + '"' +
           ' data-sku="'      + escapeHtml(d.sku)      + '"' +
           ' data-unit="'     + escapeHtml(d.unit)     + '"' +
           ' data-category="' + escapeHtml(d.category) + '"' +
           ' onclick="selectDrug(this)"' +
           ' onmouseenter="highlightDrugItem(' + i + ')"' +
           ' style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9;' +
                  'background:' + (isSelected ? '#f0fdf4' : '#fff') + ';' +
                  'transition:background 0.12s;">' +

        // ชื่อยา + checkmark
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">' +
          '<div style="font-size:14px;font-weight:600;color:#111827;flex:1;">' +
            highlighted +
          '</div>' +
          (isSelected
            ? '<svg width="14" height="14" fill="none" stroke="#16a34a" viewBox="0 0 24 24">' +
                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"' +
                ' d="M5 13l4 4L19 7"/></svg>'
            : '') +
        '</div>' +

        // badge SKU / หน่วย / หมวดหมู่
        '<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">' +
          (d.sku
            ? '<span style="font-size:11px;color:#6b7280;background:#f3f4f6;' +
                     'border-radius:4px;padding:1px 6px;white-space:nowrap;">' +
                'SKU: ' + escapeHtml(d.sku) + '</span>'
            : '') +
          (d.unit
            ? '<span style="font-size:11px;color:#166534;background:#dcfce7;' +
                     'border-radius:4px;padding:1px 6px;white-space:nowrap;">' +
                '🔢 ' + escapeHtml(d.unit) + '</span>'
            : '') +
          (d.category
            ? '<span style="font-size:11px;color:#1d4ed8;background:#dbeafe;' +
                     'border-radius:4px;padding:1px 6px;white-space:nowrap;">' +
                escapeHtml(d.category) + '</span>'
            : '') +
        '</div>' +

      '</div>'
    );
  }).join('');

  dropdown.classList.remove('hidden');
}

// ============================================================
// highlightDrugItem
// ============================================================
function highlightDrugItem(idx) {
  _drugDropdownIdx = idx;
  var dropdown = document.getElementById('apDrugDropdown');
  if (!dropdown) return;
  dropdown.querySelectorAll('.drug-dd-item').forEach(function(el, i) {
    el.style.background = (i === idx) ? '#eff6ff' : '';
  });
}

// ============================================================
// selectDrug - เลือกยา และ fill ทุก field อัตโนมัติ
// ============================================================
function selectDrug(el) {
  // ดึงค่าจาก data attributes
  var name     = el.dataset.name     || '';
  var sku      = el.dataset.sku      || '';
  var unit     = el.dataset.unit     || '';
  var category = el.dataset.category || '';

  _selectedDrug = { name: name, sku: sku, unit: unit, category: category };

  // ── 1. fill ชื่อยา ──────────────────────────────────────────
  var nameInput = document.getElementById('apProductName');
  if (nameInput) {
    nameInput.value = name;
    clearFieldError('apProductName');
  }

  // ── 2. fill SKU (col A) ─────────────────────────────────────
  var skuInput = document.getElementById('apSku');
  var skuLabel = document.getElementById('apSkuAutoLabel');
  if (skuInput) skuInput.value = sku;
  if (skuLabel) skuLabel.classList.toggle('hidden', !sku);

  // ── 3. fill หน่วย (col C) ───────────────────────────────────
  _fillUnitField(unit);

  // ── 4. fill หมวดหมู่ (col D) ────────────────────────────────
  _fillCategoryField(category);

  // ── 5. แสดง badge ───────────────────────────────────────────
  var badge    = document.getElementById('apSelectedDrugBadge');
  var badgeTxt = document.getElementById('apSelectedDrugText');
  if (badge && badgeTxt) {
    badgeTxt.textContent = name;
    badge.classList.remove('hidden');
  }

  // ── 6. แสดง preview card ────────────────────────────────────
  _updatePreviewCard(name, sku, unit, category);

  // ── 7. แสดง clear button ────────────────────────────────────
  var clearBtn = document.getElementById('apProductNameClear');
  if (clearBtn) clearBtn.classList.remove('hidden');

  // ── 8. ปิด dropdown ─────────────────────────────────────────
  closeDrugDropdown();

  // ── 9. focus ไปที่ ROP ──────────────────────────────────────
  setTimeout(function() {
    var ropEl = document.getElementById('apReorderPoint');
    if (ropEl) ropEl.focus();
  }, 100);
}

// ============================================================
// _fillUnitField - fill หน่วย จาก col C
// แสดงใน display input, เก็บค่าใน hidden select หรือ custom input
// ============================================================
function _fillUnitField(unit) {
  var displayEl = document.getElementById('apUnitDisplay');
  var selectEl  = document.getElementById('apUnit');
  var customEl  = document.getElementById('apUnitCustom');
  var labelEl   = document.getElementById('apUnitAutoLabel');

  if (!displayEl) return;

  if (!unit) {
    displayEl.value = '';
    if (labelEl) labelEl.classList.add('hidden');
    return;
  }

  // แสดงใน readonly display
  displayEl.value           = unit;
  displayEl.style.background = '#f0fdf4';
  displayEl.style.color      = '#166534';
  displayEl.style.fontWeight = '600';

  // เซ็ตใน hidden select (ถ้ามี option ตรง)
  if (selectEl) {
    var found = false;
    for (var i = 0; i < selectEl.options.length; i++) {
      if (selectEl.options[i].value === unit || selectEl.options[i].text === unit) {
        selectEl.value = selectEl.options[i].value;
        found = true;
        break;
      }
    }
    if (!found && customEl) {
      customEl.value = unit;
    }
  }

  if (labelEl) labelEl.classList.remove('hidden');
}

// ============================================================
// _fillCategoryField - fill หมวดหมู่ จาก col D
// ============================================================
function _fillCategoryField(category) {
  var displayEl = document.getElementById('apCategoryDisplay');
  var selectEl  = document.getElementById('apCategory');
  var customEl  = document.getElementById('apCategoryCustom');
  var labelEl   = document.getElementById('apCategoryAutoLabel');

  if (!displayEl) return;

  if (!category) {
    displayEl.value = '';
    if (labelEl) labelEl.classList.add('hidden');
    return;
  }

  // แสดงใน readonly display
  displayEl.value           = category;
  displayEl.style.background = '#eff6ff';
  displayEl.style.color      = '#1e40af';
  displayEl.style.fontWeight = '600';

  // เซ็ตใน hidden select
  if (selectEl) {
    var found = false;
    for (var i = 0; i < selectEl.options.length; i++) {
      if (selectEl.options[i].value === category || selectEl.options[i].text === category) {
        selectEl.value = selectEl.options[i].value;
        found = true;
        break;
      }
    }
    if (!found && customEl) {
      customEl.value = category;
    }
  }

  if (labelEl) labelEl.classList.remove('hidden');
}

// ============================================================
// _updatePreviewCard - แสดง preview card ข้อมูลที่เลือก
// ============================================================
function _updatePreviewCard(name, sku, unit, category) {
  var preview = document.getElementById('apDrugPreview');
  var content = document.getElementById('apDrugPreviewContent');
  if (!preview || !content) return;

  var rows = '';
  if (name)     rows += '<div><span class="text-blue-500 font-medium">ชื่อยา:</span> ' + escapeHtml(name) + '</div>';
  if (sku)      rows += '<div><span class="text-blue-500 font-medium">SKU:</span> ' + escapeHtml(sku) + '</div>';
  if (unit)     rows += '<div><span class="text-blue-500 font-medium">หน่วย:</span> ' + escapeHtml(unit) + '</div>';
  if (category) rows += '<div><span class="text-blue-500 font-medium">หมวดหมู่:</span> ' + escapeHtml(category) + '</div>';

  content.innerHTML = rows;
  preview.classList.remove('hidden');
}

// ============================================================
// keyboard navigation
// ============================================================
function onDrugKeyDown(event) {
  var dropdown = document.getElementById('apDrugDropdown');
  if (!dropdown || dropdown.classList.contains('hidden')) return;
  var items = dropdown.querySelectorAll('.drug-dd-item');
  if (!items.length) return;

  if (event.key === 'ArrowDown') {
    event.preventDefault();
    _drugDropdownIdx = Math.min(_drugDropdownIdx + 1, items.length - 1);
    highlightDrugItem(_drugDropdownIdx);
    items[_drugDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    _drugDropdownIdx = Math.max(_drugDropdownIdx - 1, 0);
    highlightDrugItem(_drugDropdownIdx);
    items[_drugDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (event.key === 'Enter') {
    event.preventDefault();
    if (_drugDropdownIdx >= 0 && items[_drugDropdownIdx]) {
      selectDrug(items[_drugDropdownIdx]);
    }
  } else if (event.key === 'Escape') {
    closeDrugDropdown();
  }
}

// ============================================================
// toggleDrugDropdown
// ============================================================
function toggleDrugDropdown() {
  var dropdown = document.getElementById('apDrugDropdown');
  if (!dropdown) return;
  if (dropdown.classList.contains('hidden')) {
    if (!_drugLoaded) {
      loadDrugList();
      showToast('กำลังโหลดรายการยา...', 'info', 1500);
      return;
    }
    onDrugSearch('');
  } else {
    closeDrugDropdown();
  }
}

// ============================================================
// closeDrugDropdown
// ============================================================
function closeDrugDropdown() {
  var el = document.getElementById('apDrugDropdown');
  if (el) el.classList.add('hidden');
  _drugDropdownIdx = -1;
}

// ============================================================
// clearDrugSelection - ล้างการเลือกทั้งหมด
// ============================================================
function clearDrugSelection() {
  _selectedDrug = null;

  // ล้างชื่อยา
  var nameInput = document.getElementById('apProductName');
  if (nameInput) { nameInput.value = ''; nameInput.focus(); }

  // ล้าง SKU
  var skuInput = document.getElementById('apSku');
  if (skuInput) skuInput.value = '';
  var skuLabel = document.getElementById('apSkuAutoLabel');
  if (skuLabel) skuLabel.classList.add('hidden');

  // ล้าง หน่วย
  var unitDisplay = document.getElementById('apUnitDisplay');
  if (unitDisplay) {
    unitDisplay.value           = '';
    unitDisplay.style.background = '';
    unitDisplay.style.color      = '';
    unitDisplay.style.fontWeight = '';
  }
  var unitCustom = document.getElementById('apUnitCustom');
  if (unitCustom) { unitCustom.value = ''; unitCustom.classList.add('hidden'); }
  var unitLabel = document.getElementById('apUnitAutoLabel');
  if (unitLabel) unitLabel.classList.add('hidden');

  // ล้าง หมวดหมู่
  var catDisplay = document.getElementById('apCategoryDisplay');
  if (catDisplay) {
    catDisplay.value           = '';
    catDisplay.style.background = '';
    catDisplay.style.color      = '';
    catDisplay.style.fontWeight = '';
  }
  var catCustom = document.getElementById('apCategoryCustom');
  if (catCustom) { catCustom.value = ''; catCustom.classList.add('hidden'); }
  var catLabel = document.getElementById('apCategoryAutoLabel');
  if (catLabel) catLabel.classList.add('hidden');

  // ซ่อน badge และ preview
  var badge    = document.getElementById('apSelectedDrugBadge');
  var preview  = document.getElementById('apDrugPreview');
  var clearBtn = document.getElementById('apProductNameClear');
  if (badge)    badge.classList.add('hidden');
  if (preview)  preview.classList.add('hidden');
  if (clearBtn) clearBtn.classList.add('hidden');

  closeDrugDropdown();
}

// ============================================================
// ปิด dropdown เมื่อคลิกนอก
// ============================================================
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('apProductNameWrap');
  if (wrap && !wrap.contains(e.target)) closeDrugDropdown();
}, true);

// ============================================================
// toggleInitialSection
// ============================================================
function toggleInitialSection() {
  var checked = document.getElementById('apHasInitial').checked;
  var section = document.getElementById('initialSection');
  if (section) {
    if (checked) section.classList.remove('hidden');
    else         section.classList.add('hidden');
  }
}

// ============================================================
// adjustApQty
// ============================================================
function adjustApQty(delta) {
  var el = document.getElementById('apInitialQty');
  if (!el) return;
  el.value = Math.max(1, (parseInt(el.value) || 0) + delta);
  clearFieldError('apInitialQty');
}

// ============================================================
// _getUnitValue - ดึงค่าหน่วยจริง
// ============================================================
function _getUnitValue() {
  // ใช้ค่าจาก display input เป็นหลัก (มาจาก Drug list)
  var display = document.getElementById('apUnitDisplay');
  if (display && display.value.trim()) return display.value.trim();
  // fallback: custom input
  var custom = document.getElementById('apUnitCustom');
  if (custom && !custom.classList.contains('hidden') && custom.value.trim()) {
    return custom.value.trim();
  }
  // fallback: hidden select
  var sel = document.getElementById('apUnit');
  return (sel && sel.value !== '__custom__') ? sel.value : '';
}

// ============================================================
// _getCategoryValue - ดึงค่าหมวดหมู่จริง
// ============================================================
function _getCategoryValue() {
  var display = document.getElementById('apCategoryDisplay');
  if (display && display.value.trim()) return display.value.trim();
  var custom = document.getElementById('apCategoryCustom');
  if (custom && !custom.classList.contains('hidden') && custom.value.trim()) {
    return custom.value.trim();
  }
  var sel = document.getElementById('apCategory');
  return (sel && sel.value !== '__custom__') ? sel.value : '';
}

// ============================================================
// resetAddProductForm
// ============================================================
function resetAddProductForm() {
  var bc = document.getElementById('apBarcode');
  if (bc) bc.value = '';
  clearFieldError('apBarcode');

  clearDrugSelection();

  var rop = document.getElementById('apReorderPoint');
  if (rop) rop.value = '0';

  var chk = document.getElementById('apHasInitial');
  var sec = document.getElementById('initialSection');
  if (chk) chk.checked = false;
  if (sec) sec.classList.add('hidden');

  ['apLotNumber','apExpiryDate'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
    clearFieldError(id);
  });
  var qty = document.getElementById('apInitialQty');
  if (qty) qty.value = '1';
  clearFieldError('apInitialQty');

  var rem = document.getElementById('apRemark');
  if (rem) rem.value = '';

  _submitLock = false;
  var btn = document.getElementById('apSubmitBtn');
  if (btn) {
    btn.disabled  = false;
    btn.innerHTML =
      '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
      '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>' +
      '</svg> บันทึกยาและเวชภัณฑ์';
  }
}

// ============================================================
// submitAddProduct
// ============================================================
function submitAddProduct() {
  if (_submitLock) return;

  var valid = validateForm([
    { id: 'apBarcode',     message: 'กรุณากรอกบาร์โค้ด' },
    { id: 'apProductName', message: 'กรุณากรอกหรือเลือกชื่อยา' }
  ]);

  var hasInitial   = document.getElementById('apHasInitial').checked;
  var validInitial = true;
  if (hasInitial) {
    validInitial = validateForm([
      { id: 'apLotNumber',  message: 'กรุณากรอก LOT NUMBER' },
      { id: 'apExpiryDate', message: 'กรุณาเลือกวันหมดอายุ' },
      { id: 'apInitialQty', message: 'กรุณากรอกจำนวน' }
    ]);
  }
  if (!valid || !validInitial) return;

  if (hasInitial) {
    var expiry = document.getElementById('apExpiryDate').value;
    if (expiry && new Date(expiry) < new Date(new Date().setHours(0,0,0,0))) {
      Swal.fire({
        icon: 'warning', title: 'วันหมดอายุผ่านแล้ว',
        text: 'วันหมดอายุที่กรอกอยู่ในอดีต ต้องการดำเนินการต่อหรือไม่?',
        showCancelButton: true,
        confirmButtonText: 'ดำเนินการต่อ', cancelButtonText: 'แก้ไข',
        confirmButtonColor: '#f59e0b'
      }).then(function(r) {
        if (r.isConfirmed) _doSubmitAddProduct(hasInitial);
      });
      return;
    }
  }
  _doSubmitAddProduct(hasInitial);
}

// ============================================================
// _doSubmitAddProduct
// ============================================================
function _doSubmitAddProduct(hasInitial) {
  _submitLock = true;
  var btn = document.getElementById('apSubmitBtn');
  if (btn) {
    btn.disabled  = true;
    btn.innerHTML =
      '<span style="display:inline-block;width:16px;height:16px;' +
      'border:2px solid #fff;border-top-color:transparent;border-radius:50%;' +
      'animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;">' +
      '</span>กำลังบันทึก...';
  }

  var data = {
    barcode:      document.getElementById('apBarcode').value.trim(),
    sku:          (document.getElementById('apSku').value || '').trim(),
    productName:  document.getElementById('apProductName').value.trim(),
    unit:         _getUnitValue(),
    category:     _getCategoryValue(),
    reorderPoint: document.getElementById('apReorderPoint').value || '0',
    remark:       (document.getElementById('apRemark').value || '').trim()
  };

  if (hasInitial) {
    data.lotNumber  = document.getElementById('apLotNumber').value.trim();
    data.expiryDate = document.getElementById('apExpiryDate').value;
    data.initialQty = document.getElementById('apInitialQty').value;
  }

  showLoading('กำลังบันทึกยาและเวชภัณฑ์...');

  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      _submitLock = false;
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML =
          '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
          '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"' +
          ' d="M5 13l4 4L19 7"/></svg> บันทึกยาและเวชภัณฑ์';
      }

      if (result.success) {
        Swal.fire({
          icon: 'success', title: 'บันทึกสำเร็จ', text: result.message,
          confirmButtonText: 'ตกลง', confirmButtonColor: '#2563eb'
        }).then(function() { resetAddProductForm(); });

      } else if (result.duplicate) {
        Swal.fire({
          icon: 'warning', title: 'บาร์โค้ดซ้ำ',
          html: '<p>' + escapeHtml(result.message) + '</p>' +
                '<p class="text-sm text-gray-500 mt-2">' +
                'ต้องการเพิ่ม LOT ใหม่สำหรับยานี้หรือไม่?</p>',
          showCancelButton: true,
          confirmButtonText: 'ไปที่รับของเข้า',
          cancelButtonText:  'ยกเลิก',
          confirmButtonColor: '#16a34a'
        }).then(function(r) { if (r.isConfirmed) switchPage('stock-in'); });

      } else {
        Swal.fire({
          icon: 'error', title: 'เกิดข้อผิดพลาด',
          text: result.message, confirmButtonColor: '#2563eb'
        });
      }
    })
    .withFailureHandler(function(err) {
      hideLoading();
      _submitLock = false;
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML =
          '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
          '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"' +
          ' d="M5 13l4 4L19 7"/></svg> บันทึกยาและเวชภัณฑ์';
      }
      Swal.fire({
        icon: 'error', title: 'เกิดข้อผิดพลาด',
        text: err.message, confirmButtonColor: '#2563eb'
      });
    })
    .saveProduct(data);
}

<script>
// ── State ─────────────────────────────────────────────────────
var siCurrentProduct   = null;
var siProductSource    = '';      // 'barcode' | 'drug-list' | 'new'
var _siDrugList        = [];
var _siDrugLoaded      = false;
var _siDrugDropdownIdx = -1;

// ============================================================
// siSwitchTab - สลับ tab
// ============================================================
function siSwitchTab(tab) {
  // reset tab buttons
  document.querySelectorAll('.si-tab').forEach(function(btn) {
    btn.classList.remove('bg-white','shadow-sm','text-blue-700');
    btn.classList.add('text-gray-600');
  });
  // reset panels
  document.querySelectorAll('.si-tab-panel').forEach(function(p) {
    p.classList.add('hidden');
  });

  if (tab === 'scan') {
    var btn   = document.getElementById('siTabScan');
    var panel = document.getElementById('siTabPanelScan');
    if (btn)   { btn.classList.remove('text-gray-600');
                 btn.classList.add('bg-white','shadow-sm','text-blue-700'); }
    if (panel) panel.classList.remove('hidden');

    setTimeout(function() {
      var bc = document.getElementById('siBarcode');
      if (bc) bc.focus();
    }, 50);

  } else if (tab === 'list') {
    var btn   = document.getElementById('siTabList');
    var panel = document.getElementById('siTabPanelList');
    if (btn)   { btn.classList.remove('text-gray-600');
                 btn.classList.add('bg-white','shadow-sm','text-blue-700'); }
    if (panel) panel.classList.remove('hidden');

    // โหลด Drug list ถ้ายังไม่เคยโหลด
    if (!_siDrugLoaded) siLoadDrugList();

    setTimeout(function() {
      var inp = document.getElementById('siDrugSearch');
      if (inp) inp.focus();
    }, 50);
  }
}

// ============================================================
// siLoadDrugList - โหลดรายการยา
// ============================================================
function siLoadDrugList() {
  if (_siDrugLoaded) return;
  var badge = document.getElementById('siDrugLoadingBadge');
  if (badge) badge.classList.remove('hidden');

  google.script.run
    .withSuccessHandler(function(result) {
      if (badge) badge.classList.add('hidden');
      if (result && result.success) {
        _siDrugList   = result.data || [];
        _siDrugLoaded = true;
      } else {
        showToast('โหลดรายการยาไม่สำเร็จ: ' +
          (result ? result.message : ''), 'warning');
      }
    })
    .withFailureHandler(function() {
      if (badge) badge.classList.add('hidden');
      showToast('โหลดรายการยาไม่สำเร็จ', 'warning');
    })
    .getDrugList();
}

// ============================================================
// siOnDrugFocus
// ============================================================
function siOnDrugFocus() {
  if (!_siDrugLoaded) { siLoadDrugList(); return; }
  var kw = document.getElementById('siDrugSearch').value;
  siOnDrugSearch(kw);
}

// ============================================================
// siOnDrugSearch - filter + render dropdown
// ============================================================
function siOnDrugSearch(keyword) {
  if (!_siDrugLoaded) { siLoadDrugList(); return; }

  var dropdown = document.getElementById('siDrugDropdown');
  var clearBtn = document.getElementById('siDrugClearBtn');
  if (!dropdown) return;

  keyword = (keyword || '').trim();
  if (clearBtn) clearBtn.classList.toggle('hidden', !keyword);

  var filtered = keyword
    ? _siDrugList.filter(function(d) {
        return d.name.toLowerCase().includes(keyword.toLowerCase()) ||
               d.sku.toLowerCase().includes(keyword.toLowerCase());
      })
    : _siDrugList;

  if (filtered.length === 0) {
    dropdown.innerHTML =
      '<div style="padding:16px;text-align:center;color:#9ca3af;font-size:13px;">' +
        'ไม่พบรายการ "' + escapeHtml(keyword) + '"' +
      '</div>';
    dropdown.classList.remove('hidden');
    return;
  }

  _siDrugDropdownIdx = -1;
  dropdown.innerHTML = filtered.map(function(d, i) {
    var highlighted = keyword
      ? d.name.replace(
          new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'),
          '<mark style="background:#fef08a;border-radius:2px;padding:0 1px;">$1</mark>'
        )
      : escapeHtml(d.name);

    return (
      '<div class="si-drug-dd-item"' +
           ' data-idx="'      + i                  + '"' +
           ' data-name="'     + escapeHtml(d.name)     + '"' +
           ' data-sku="'      + escapeHtml(d.sku)      + '"' +
           ' data-unit="'     + escapeHtml(d.unit)     + '"' +
           ' data-category="' + escapeHtml(d.category) + '"' +
           ' onclick="siSelectDrug(this)"' +
           ' onmouseenter="siHighlightDrugItem(' + i + ')"' +
           ' style="padding:10px 14px;cursor:pointer;' +
                  'border-bottom:1px solid #f1f5f9;background:#fff;' +
                  'transition:background 0.12s;">' +

        '<div style="font-size:14px;font-weight:600;color:#111827;">' +
          highlighted +
        '</div>' +

        '<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">' +
          (d.sku
            ? '<span style="font-size:11px;color:#6b7280;background:#f3f4f6;' +
                     'border-radius:4px;padding:1px 6px;">SKU: ' +
                     escapeHtml(d.sku) + '</span>'
            : '') +
          (d.unit
            ? '<span style="font-size:11px;color:#166534;background:#dcfce7;' +
                     'border-radius:4px;padding:1px 6px;">🔢 ' +
                     escapeHtml(d.unit) + '</span>'
            : '') +
          (d.category
            ? '<span style="font-size:11px;color:#1d4ed8;background:#dbeafe;' +
                     'border-radius:4px;padding:1px 6px;">' +
                     escapeHtml(d.category) + '</span>'
            : '') +
        '</div>' +

      '</div>'
    );
  }).join('');

  dropdown.classList.remove('hidden');
}

// ============================================================
// siHighlightDrugItem
// ============================================================
function siHighlightDrugItem(idx) {
  _siDrugDropdownIdx = idx;
  var dropdown = document.getElementById('siDrugDropdown');
  if (!dropdown) return;
  dropdown.querySelectorAll('.si-drug-dd-item').forEach(function(el, i) {
    el.style.background = (i === idx) ? '#eff6ff' : '#fff';
  });
}

// ============================================================
// siSelectDrug - เลือกยาจาก Drug list
// ต้องหาสินค้าจาก Products sheet ด้วย SKU หรือสร้างใหม่
// ============================================================
function siSelectDrug(el) {
  var name     = el.dataset.name     || '';
  var sku      = el.dataset.sku      || '';
  var unit     = el.dataset.unit     || '';
  var category = el.dataset.category || '';

  siCloseDrugDropdown();

  if (!sku) {
    showToast('รายการนี้ไม่มี SKU กรุณาสแกนบาร์โค้ดแทน', 'warning');
    return;
  }

  showLoading('กำลังค้นหายา...');

  // ค้นหาใน Products sheet ด้วย SKU
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();

      if (result && result.success && result.data) {
        // เจอในระบบแล้ว → ใช้ข้อมูลจาก Products
        siCurrentProduct = result.data;
        siProductSource  = 'drug-list';
        siShowProductInfo(result.data);

        // fill barcode เผื่อดู
        var bc = document.getElementById('siBarcode');
        if (bc) bc.value = result.data.barcode || '';

        setTimeout(function() {
          var lot = document.getElementById('siLotNumber');
          if (lot) lot.focus();
        }, 100);

      } else {
        // ไม่เจอในระบบ → ถามว่าจะเพิ่มหรือไม่
        Swal.fire({
          icon: 'info',
          title: 'ไม่พบในระบบสินค้า',
          html:
            '<p class="text-sm">ยา <b>' + escapeHtml(name) + '</b></p>' +
            '<p class="text-sm text-gray-500">SKU: ' + escapeHtml(sku) + '</p>' +
            '<p class="text-sm mt-2">ยังไม่มีในระบบ ต้องการเพิ่มสินค้าใหม่ก่อนหรือไม่?</p>',
          showCancelButton: true,
          confirmButtonText: 'เพิ่มสินค้าใหม่',
          cancelButtonText:  'ยกเลิก',
          confirmButtonColor: '#2563eb'
        }).then(function(r) {
          if (r.isConfirmed) {
            switchPage('add-product');
            // รอหน้าโหลดแล้ว fill ข้อมูล
            setTimeout(function() {
              var sEl = document.getElementById('apSku');
              var pEl = document.getElementById('apProductName');
              if (sEl) sEl.value = sku;
              if (pEl) pEl.value = name;
              // trigger auto-fill ถ้าเลือก product name จาก drug list ได้
              if (typeof selectDrug === 'function') {
                // สร้าง fake element เพื่อใช้ selectDrug
                var fake = document.createElement('div');
                fake.dataset.name     = name;
                fake.dataset.sku      = sku;
                fake.dataset.unit     = unit;
                fake.dataset.category = category;
                selectDrug(fake);
              }
            }, 300);
          }
        });
      }
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('ค้นหาไม่สำเร็จ: ' + err.message, 'error');
    })
    .searchProductBySku(sku);
}

// ============================================================
// siOnDrugKeyDown - keyboard navigation
// ============================================================
function siOnDrugKeyDown(event) {
  var dropdown = document.getElementById('siDrugDropdown');
  if (!dropdown || dropdown.classList.contains('hidden')) return;
  var items = dropdown.querySelectorAll('.si-drug-dd-item');
  if (!items.length) return;

  if (event.key === 'ArrowDown') {
    event.preventDefault();
    _siDrugDropdownIdx = Math.min(_siDrugDropdownIdx + 1, items.length - 1);
    siHighlightDrugItem(_siDrugDropdownIdx);
    items[_siDrugDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    _siDrugDropdownIdx = Math.max(_siDrugDropdownIdx - 1, 0);
    siHighlightDrugItem(_siDrugDropdownIdx);
    items[_siDrugDropdownIdx].scrollIntoView({ block: 'nearest' });
  } else if (event.key === 'Enter') {
    event.preventDefault();
    if (_siDrugDropdownIdx >= 0 && items[_siDrugDropdownIdx]) {
      siSelectDrug(items[_siDrugDropdownIdx]);
    }
  } else if (event.key === 'Escape') {
    siCloseDrugDropdown();
  }
}

// ============================================================
// siToggleDrugDropdown
// ============================================================
function siToggleDrugDropdown() {
  var dropdown = document.getElementById('siDrugDropdown');
  if (!dropdown) return;
  if (dropdown.classList.contains('hidden')) {
    if (!_siDrugLoaded) {
      siLoadDrugList();
      showToast('กำลังโหลดรายการยา...','info',1500);
      return;

    siOnDrugSearch('');

    siCloseDrugDropdown();
  }
}

function siCloseDrugDropdown() {

  if (el) el.classList.add('hidden');

}

// ============================================================
// siShowProductInfo - แสดงข้อมูลสินค้าที่เลือก
// ============================================================
function siShowProductInfo(product) {
  document.getElementById('siProductInfo').classList.remove('hidden');
  document.getElementById('siForm').classList.remove('hidden');

  document.getElementById('siProductName').textContent = product.productName;

  var detail = 'SKU: ' + (product.sku || '-') +
               ' | หน่วย: ' + (product.unit || '-') +
               (product.packSize ? ' | ' + product.packSize : '');
  document.getElementById('siProductDetail').textContent = detail;

  var unitLabel = document.getElementById('siUnitLabel');
  if (unitLabel) unitLabel.textContent = product.unit || '';

  // แสดงแหล่งที่มา
  var srcEl = document.getElementById('siProductSource');
  if (srcEl) {
    if (siProductSource === 'barcode') {
      srcEl.innerHTML =
        '<span class="text-blue-500">📱</span> เลือกจากการสแกน barcode';
    } else if (siProductSource === 'drug-list') {
      srcEl.innerHTML =
        '<span class="text-green-500">📋</span> เลือกจากรายการยา';
    } else {
      srcEl.innerHTML = '';
    }
  }

  siUpdateSummary();
}

// ============================================================
// adjustQty
// ============================================================
function adjustQty(fieldId, delta) {
  var el  = document.getElementById(fieldId);
  if (!el) return;
  el.value = Math.max(1, (parseInt(el.value) || 0) + delta);
  clearFieldError(fieldId);
  siUpdateSummary();
}

// ============================================================
// siUpdateRequisitionBadge
// ============================================================
function siUpdateRequisitionBadge() {
  var no   = (document.getElementById('siRequisitionNo').value   || '').trim();
  var date = (document.getElementById('siRequisitionDate').value || '').trim();
  var badge    = document.getElementById('siRequisitionBadge');
  var badgeTxt = document.getElementById('siRequisitionBadgeText');
  if (!badge || !badgeTxt) return;

  if (no || date) {
    var parts = [];
    if (no)   parts.push('เลขที่: ' + no);
    if (date) parts.push('วันที่: ' + formatDateTH(date));
    badgeTxt.textContent = parts.join(' | ');
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
  siUpdateSummary();
}

// ============================================================
// formatDateTH
// ============================================================
function formatDateTH(dateStr) {
  if (!dateStr) return '';
  try {
    var parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  } catch(e) { return dateStr; }
}

// ============================================================
// searchProductForIn - ค้นหาจาก barcode
// ============================================================
function searchProductForIn() {
  var barcode = (document.getElementById('siBarcode').value || '').trim();
  if (!barcode) {
    showFieldError('siBarcode', 'กรุณากรอกบาร์โค้ด');
    return;
  }
  clearFieldError('siBarcode');
  showLoading('กำลังค้นหายาและเวชภัณฑ์...');

  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (result.success) {
        siCurrentProduct = result.data;
        siProductSource  = 'barcode';
        siShowProductInfo(result.data);

        setTimeout(function() {
          var lotEl = document.getElementById('siLotNumber');
          if (lotEl) lotEl.focus();
        }, 100);
      } else {
        Swal.fire({
          icon: 'warning',
          title: 'ไม่พบยาและเวชภัณฑ์',
          html: '<p>' + escapeHtml(result.message) + '</p>' +
                '<p class="text-sm text-gray-500 mt-1">' +
                'ต้องการเพิ่มยาและเวชภัณฑ์ใหม่หรือไม่?</p>',
          showCancelButton: true,
          confirmButtonText: 'เพิ่มยาและเวชภัณฑ์ใหม่',
          cancelButtonText: 'ยกเลิก',
          confirmButtonColor: '#2563eb'
        }).then(function(r) {
          if (r.isConfirmed) {
            switchPage('add-product');
            setTimeout(function() {
              var bc = document.getElementById('apBarcode');
              if (bc) bc.value = barcode;
            }, 100);
          }
        });
      }
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    })
    .searchProductByBarcode(barcode);
}

// ============================================================
// siUpdateSummary
// ============================================================
function siUpdateSummary() {
  var box     = document.getElementById('siSummaryBox');
  var content = document.getElementById('siSummaryContent');
  if (!box || !content || !siCurrentProduct) return;

  var reqNo   = (document.getElementById('siRequisitionNo').value   || '').trim();
  var reqDate = (document.getElementById('siRequisitionDate').value || '').trim();
  var lot     = (document.getElementById('siLotNumber').value       || '').trim();
  var expiry  = (document.getElementById('siExpiryDate').value      || '');
  var qty     = document.getElementById('siQty').value || '1';
  var remark  = (document.getElementById('siRemark').value          || '').trim();

  var rows = [];
  if (reqNo)   rows.push('<div>📄 ใบเบิก: <b>' + escapeHtml(reqNo) + '</b></div>');
  if (reqDate) rows.push('<div>📅 วันที่ใบเบิก: <b>' + formatDateTH(reqDate) + '</b></div>');
  rows.push('<div>📦 สินค้า: <b>' + escapeHtml(siCurrentProduct.productName) + '</b></div>');
  if (lot)     rows.push('<div>🏷️ LOT: <b>' + escapeHtml(lot) + '</b></div>');
  if (expiry)  rows.push('<div>📆 หมดอายุ: <b>' + formatDateTH(expiry) + '</b></div>');
  rows.push('<div>🔢 จำนวน: <b class="text-blue-700">' +
            formatNumber(parseInt(qty) || 0) + ' ' +
            escapeHtml(siCurrentProduct.unit) + '</b></div>');
  if (remark)  rows.push('<div>💬 หมายเหตุ: ' + escapeHtml(remark) + '</div>');

  content.innerHTML = rows.join('');
  box.classList.remove('hidden');
}

// ============================================================
// resetStockInProduct
// ============================================================
function resetStockInProduct() {
  siCurrentProduct = null;
  siProductSource  = '';

  document.getElementById('siBarcode').value = '';
  var drugSearch = document.getElementById('siDrugSearch');
  if (drugSearch) drugSearch.value = '';
  var clearBtn = document.getElementById('siDrugClearBtn');
  if (clearBtn) clearBtn.classList.add('hidden');

  document.getElementById('siProductInfo').classList.add('hidden');
  document.getElementById('siForm').classList.add('hidden');
  document.getElementById('siSummaryBox').classList.add('hidden');

  ['siLotNumber','siExpiryDate','siRemark'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
    clearFieldError(id);
  });
  document.getElementById('siQty').value = '1';
  clearFieldError('siBarcode');
}

// ============================================================
// resetStockInForm
// ============================================================
function resetStockInForm() {
  var reqNo   = document.getElementById('siRequisitionNo');
  var reqDate = document.getElementById('siRequisitionDate');
  if (reqNo)   reqNo.value   = '';
  if (reqDate) reqDate.value = '';

}

// ============================================================
// submitStockIn
// ============================================================
function submitStockIn() {
  if (_submitLock || !siCurrentProduct) return;

  var valid = validateForm([
    { id: 'siLotNumber',  message: 'กรุณากรอก LOT NUMBER' },
    { id: 'siExpiryDate', message: 'กรุณาเลือกวันหมดอายุ' },
    { id: 'siQty',        message: 'กรุณากรอกจำนวน' }
  ]);
  if (!valid) return;

  var qty = parseInt(document.getElementById('siQty').value);
  if (!qty || qty <= 0) {
    showFieldError('siQty', 'จำนวนต้องมากกว่า 0');
    return;
  }

  var reqNo   = (document.getElementById('siRequisitionNo').value   || '').trim();
  var reqDate = (document.getElementById('siRequisitionDate').value || '').trim();
  var lot     = document.getElementById('siLotNumber').value.trim();
  var expiry  = document.getElementById('siExpiryDate').value;
  var remark  = (document.getElementById('siRemark').value || '').trim();

  Swal.fire({
    icon: 'question',
    title: 'ยืนยันรับของเข้า',
    html:
      '<div class="text-left space-y-1 text-sm">' +
      (reqNo   ? '<div>📄 <b>ใบเบิก:</b> '       + escapeHtml(reqNo)   + '</div>' : '') +
      (reqDate ? '<div>📅 <b>วันที่ใบเบิก:</b> ' + formatDateTH(reqDate) + '</div>' : '') +
      '<div>📦 <b>สินค้า:</b> ' + escapeHtml(siCurrentProduct.productName) + '</div>' +
      '<div>🏷️ <b>LOT:</b> '     + escapeHtml(lot)    + '</div>' +
      '<div>📆 <b>หมดอายุ:</b> ' + formatDateTH(expiry) + '</div>' +
      '<div>🔢 <b>จำนวน:</b> <span class="text-blue-600 font-bold">' +
        formatNumber(qty) + ' ' + escapeHtml(siCurrentProduct.unit) +
      '</span></div>' +
      '</div>',
    showCancelButton: true,
    confirmButtonText: 'ยืนยันรับเข้า',
    cancelButtonText:  'แก้ไข',
    confirmButtonColor: '#16a34a',
    cancelButtonColor:  '#6b7280'
  }).then(function(r) {
    if (!r.isConfirmed) return;
    _doSubmitStockIn(qty, lot, expiry, reqNo, reqDate, remark);
  });
}

// ============================================================
// _doSubmitStockIn
// ============================================================
function _doSubmitStockIn(qty, lot, expiry, reqNo, reqDate, remark) {
  _submitLock = true;
  var btn     = document.getElementById('siSubmitBtn');
  if (btn) {
    btn.disabled  = true;
    btn.innerHTML =
      '<span style="display:inline-block;width:16px;height:16px;' +
      'border:2px solid #fff;border-top-color:transparent;border-radius:50%;' +
      'animation:spin 0.8s linear infinite;margin-right:8px;' +
      'vertical-align:middle;"></span>กำลังบันทึก...';
  }

  var data = {
    txnType:         'IN',
    barcode:         siCurrentProduct.barcode,
    lotNumber:       lot,
    expiryDate:      expiry,
    qty:             qty,
    remark:          remark,
    requisitionNo:   reqNo,
    requisitionDate: reqDate
  };

  showLoading('กำลังบันทึกรับของเข้า...');

  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      _submitLock = false;
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML =
          '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
          '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"' +
          ' d="M7 16V4m0 0L3 8m4-4l4 4"/></svg> ยืนยันรับเข้า';
      }

      if (result.success) {
        Swal.fire({
          icon: 'success',
          title: 'รับของเข้าสำเร็จ',
          html:
            '<p>' + escapeHtml(result.message) + '</p>' +
            (reqNo
              ? '<p class="text-sm text-gray-500 mt-1">ใบเบิก: ' +
                escapeHtml(reqNo) + '</p>'
              : ''),
          timer: 2500,
          showConfirmButton: false,
          timerProgressBar: true
        }).then(function() { resetStockInForm(); });
      } else {
        Swal.fire({
          icon: 'error', title: 'เกิดข้อผิดพลาด',
          text: result.message, confirmButtonColor: '#2563eb'
        });
      }
    })
    .withFailureHandler(function(err) {
      hideLoading();
      _submitLock = false;
      if (btn) {
        btn.disabled  = false;
        btn.innerHTML =
          '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
          '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"' +
          ' d="M7 16V4m0 0L3 8m4-4l4 4"/></svg> ยืนยันรับเข้า';
      }
      Swal.fire({
        icon: 'error', title: 'เกิดข้อผิดพลาด',
        text: err.message, confirmButtonColor: '#2563eb'
      });
    })
    .saveTransaction(data);
}

<script>

    showFieldError('soBarcode', 'กรุณากรอกบาร์โค้ด');

    .withSuccessHandler(function(productResult) {

          soAvailableLots = lotResult.data || [];

          // แสดงข้อมูลสินค้า

          document.getElementById('soProductDetail').textContent =

            'คงเหลือรวม: ' + formatNumber(lotResult.total) + ' ' + soCurrentProduct.unit;

          if (soAvailableLots.length === 0) {

                </svg>
                <p>ไม่มีสต็อกคงเหลือ</p>
              </div>
            `;
          } else {
            renderLots(soAvailableLots);
          }
        })
        .withFailureHandler(function(err) {
          hideLoading();
          showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
        })
        .getAvailableLots(barcode);
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    })
    .searchProductByBarcode(barcode);
}

function renderLots(lots) {
  document.getElementById('soLotSection').classList.remove('hidden');
  document.getElementById('soLotList').innerHTML = lots.map(function(lot, idx) {
    const expiryColor = lot.expiryStatus === 'หมดอายุแล้ว' ? 'text-red-600 font-bold'
                      : lot.expiryStatus === 'ใกล้หมดอายุ' ? 'text-yellow-600 font-bold'
                      : 'text-green-600';
    return `
      <div class="lot-card" id="lotCard_${idx}" onclick="selectLot(${idx})">
        <div class="flex items-center justify-between">
          <div>
            <div class="flex items-center gap-2">
              <span class="text-sm font-bold text-gray-900">LOT: ${escapeHtml(lot.lotNumber)}</span>
              ${idx === 0 ? '<span class="chip chip-blue text-xs">แนะนำ (FEFO)</span>' : ''}
            </div>
            <div class="text-xs text-gray-500 mt-1">หมดอายุ: <span class="${expiryColor}">${escapeHtml(lot.expiryDate)}</span></div>
          </div>
          <div class="text-right">
            <div class="text-base font-bold text-gray-900">${formatNumber(lot.balance)}</div>
            <div class="text-xs text-gray-500">${escapeHtml(lot.unit)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function selectLot(idx) {
  soSelectedLot = soAvailableLots[idx];

  // อัปเดต visual
  document.querySelectorAll('.lot-card').forEach(function(card) {
    card.classList.remove('selected');
  });
  document.getElementById('lotCard_' + idx).classList.add('selected');

  // แสดงฟอร์มเบิก
  document.getElementById('soForm').classList.remove('hidden');
  document.getElementById('soSelectedLotLabel').textContent = soSelectedLot.lotNumber;
  document.getElementById('soSelectedLotBalance').textContent =
    formatNumber(soSelectedLot.balance) + ' ' + soSelectedLot.unit;
  document.getElementById('soUnitLabel').textContent = soSelectedLot.unit;
  document.getElementById('soQty').value = '1';
  document.getElementById('soQty').max   = soSelectedLot.balance;
  clearFieldError('soQty');

  // scroll ไปที่ฟอร์ม
  document.getElementById('soForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function adjustQtyOut(delta) {
  const el  = document.getElementById('soQty');
  const val = parseInt(el.value) || 0;
  const max = soSelectedLot ? soSelectedLot.balance : 9999;
  el.value  = Math.min(max, Math.max(1, val + delta));
  validateOutQty();
}

function validateOutQty() {
  if (!soSelectedLot) return;
  const qty = parseInt(document.getElementById('soQty').value) || 0;
  if (qty > soSelectedLot.balance) {
    showFieldError('soQty', 'เกินคงคลัง (' + formatNumber(soSelectedLot.balance) + ' ' + soSelectedLot.unit + ')');
  } else if (qty <= 0) {
    showFieldError('soQty', 'จำนวนต้องมากกว่า 0');
  } else {
    clearFieldError('soQty');
  }
}

function resetStockOutForm() {
  soCurrentProduct  = null;
  soSelectedLot     = null;
  soAvailableLots   = [];
  document.getElementById('soBarcode').value = '';
  document.getElementById('soProductInfo').classList.add('hidden');
  document.getElementById('soLotSection').classList.add('hidden');
  document.getElementById('soForm').classList.add('hidden');
  document.getElementById('soRemark').value = '';
  document.getElementById('soQty').value = '1';
  _submitLock = false;
}

function submitStockOut() {
  if (_submitLock || !soSelectedLot) {
    if (!soSelectedLot) showToast('กรุณาเลือก LOT ก่อน', 'warning');
    return;
  }

  validateOutQty();
  const qtyEl  = document.getElementById('soQty');
  const qty    = parseInt(qtyEl.value);
  if (!qty || qty <= 0) return;
  if (qty > soSelectedLot.balance) {
    showFieldError('soQty', 'เกินคงคลัง');
    return;
  }

  // confirm ก่อนเบิก
  Swal.fire({
    icon: 'question',
    title: 'ยืนยันการเบิกออก',
    html: `
      <div class="text-left space-y-1 text-sm">
        <div><b>สินค้า:</b> ${escapeHtml(soCurrentProduct.productName)}</div>
        <div><b>LOT:</b> ${escapeHtml(soSelectedLot.lotNumber)}</div>
        <div><b>จำนวน:</b> <span class="text-red-600 font-bold">${formatNumber(qty)} ${escapeHtml(soSelectedLot.unit)}</span></div>
        <div><b>คงเหลือหลังเบิก:</b> ${formatNumber(soSelectedLot.balance - qty)} ${escapeHtml(soSelectedLot.unit)}</div>
      </div>
    `,
    showCancelButton: true,
    confirmButtonText: 'ยืนยันเบิกออก',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#dc2626',
    cancelButtonColor: '#6b7280'
  }).then(function(r) {
    if (!r.isConfirmed) return;

    _submitLock = true;
    const btn   = document.getElementById('soSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span> กำลังบันทึก...';

    const data = {
      txnType:    'OUT',
      barcode:    document.getElementById('soBarcode').value.trim(),
      lotNumber:  soSelectedLot.lotNumber,
      expiryDate: soSelectedLot.expiryDate,
      qty:        qty,
      remark:     document.getElementById('soRemark').value.trim()
    };

    showLoading('กำลังบันทึกเบิกออก...');

    google.script.run
      .withSuccessHandler(function(result) {
        hideLoading();
        _submitLock = false;
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8V20M17 20l4-4m-4 4l-4-4"/></svg> ยืนยันเบิกออก';

        if (result.success) {
          Swal.fire({
            icon: 'success',
            title: 'เบิกออกสำเร็จ',
            text: result.message,
            timer: 2000,
            showConfirmButton: false,
            timerProgressBar: true
          }).then(function() { resetStockOutForm(); });
        } else {
          Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: result.message, confirmButtonColor: '#dc2626' });
        }
      })
      .withFailureHandler(function(err) {
        hideLoading();
        _submitLock = false;
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8V20M17 20l4-4m-4 4l-4-4"/></svg> ยืนยันเบิกออก';
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: err.message, confirmButtonColor: '#dc2626' });
      })
      .saveTransaction(data);
  });
}
</script></template>
